# volume-1.yaml — 第一卷「三点钟」

volume: 1
title: "三点钟"
summary: >
  第一卷建立两个陌生人在咖啡店日常中的互相观察。节奏松弛，以知意的视角为主，
  通过每天下午三点这十五分钟的咖啡时间，展开两个人的行为模式和内心世界。
  第一卷结尾，两个人都有了"对方今天会来"的期待——关系从陌生人变成了
  彼此日常里确定的一部分。

chapters_summary:
  - id: "1-1"
    title: "三点钟的客人"
    summary: >
      建立日常。知意的视角——竞标项目的压力，三点钟溜出来的十五分钟，
      慢慢注意到咖啡师的细节。结尾钩子：她发现他每次都在她来之前就开始
      磨她喝的那种豆子。

  - id: "1-2"
    title: "第十六天"
    summary: >
      知意连续来了两周后的一天。关系推进：他第一次主动跟她说话——
      不是"你好"，是"今天不加糖？"。结尾她走的时候回头看了一眼，
      发现他已经在擦吧台了——和平时一样，但又好像有哪里不一样。
