# world-setting.yaml - 世界设定

name: "第十六杯咖啡"
summary: "现代都市背景，围绕一家独立咖啡店展开的慢热情感故事。"

time_period: "当代（2020年代）"
location: "中国某二线城市老城区"

# 空间设定
locations:
  - name: "慢坡咖啡"
    type: "主要场景"
    description: >
      老城区一条斜坡路中段的独立咖啡店。店面不大，七八张桌子，
      朝西的窗下午会有阳光斜进来。老板陈序两年前盘下这个店面，
      自己做咖啡也做简单的烘焙。店里有台老式的意式机，蒸汽声很大。
      吧台后面的架子上摆着各种豆子，标签是手写的。
    notable_details:
      - "下午三点到四点的阳光会照在三号桌上"
      - "意式咖啡机打蒸汽的时候声音很大，像旧公交车的气刹"
      - "店门口的木牌上每天写一句不一样的话"
      - "角落的架子上有客人留下的书，已经攒了两排"

  - name: "知意的公寓"
    type: "次要场景"
    description: >
      离咖啡店步行十五分钟的一居室。客厅兼作工作间，桌上常年摊着图纸和马克笔。
      窗台上有盆快枯了的绿萝，是搬进来时前租客留下的。

  - name: "知意的公司"
    type: "次要场景"
    description: >
      市中心一栋写字楼的12层，建筑设计事务所。格子间、荧光灯、会议室的玻璃墙上
      贴满了竞标方案的草图。茶水间的咖啡很难喝。

# 社会设定
society:
  technology_level: "当代"
  relevant_aspects:
    - "微信沟通、手机支付、外卖APP——日常科技默认存在但不作为叙事重点"
    - "建筑行业的竞标流程和工作节奏是女主压力的来源"

# 氛围基调
atmosphere:
  primary: "烟火真实——都市生活的质感，地铁、外卖、加班夜归中的陪伴感"
  secondary: "温暖治愈——日常互动中的暖意和心动瞬间"
  keywords:
    - "日常感"
    - "烟火气"
    - "慢热"
    - "留白"
    - "细节"

# 基本规则
rules:
  - "无超自然元素"
  - "人物行为符合现实都市生活逻辑"
  - "感情线慢热递进，不跳跃"
