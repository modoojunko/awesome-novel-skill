# 陆知意 — 角色设定

name: "陆知意"
summary: "27岁，建筑设计师。每天下午三点准时出现在慢坡咖啡，点一杯黑咖啡，坐三号桌，待十五分钟。这是她一天里唯一不被打扰的时间。"

cognition: >
  理性但感性用事。做方案的时候逻辑缜密，但决定去不去一家店、
  喜不喜欢一个人，全靠直觉。知道自己要什么，但在不重要的事上
  懒得解释——比如为什么要走十五分钟去喝一杯咖啡。

worldview: >
  世界不是非黑即白的，但底线是有的。相信专业能力，不相信画饼。
  对"缘分""注定"之类的词过敏——一段关系好不好，看的是日常相处，
  不是某个戏剧性的瞬间。

self_identity: >
  一个在建筑行业里还在往上爬的普通人。不是天才，但足够认真。
  对自己的职业有信念，对自己的感情没把握。

values:
  - "方案可以改，底线不能改"
  - "说出口的话要算数"
  - "咖啡不一定要好喝，但一定要是热的"

abilities:
  - "空间感知——看一张平面图能在脑子里生成三维空间"
  - "专注力——做方案的时候可以连续四小时不抬头"

skills:
  - "建筑设计（CAD/SketchUp/Rhino）"
  - "竞标方案撰写"
  - "能喝出不同产地的咖啡豆——但从来不点单品的，只喝最普通的黑咖啡"

environment: >
  一个人住老城区的一居室。客厅兼作工作间，桌上常年摊着图纸和马克笔。
  窗外对着另一栋楼的墙，但有阳光的时候会反射进来。窗台上有盆快枯了的绿萝。

relationships:
  - name: "陈序"
    relation: "慢坡咖啡的咖啡师"
    status: "陌生人→观察对象"
    notes: "注意到他会在她来之前就开始磨豆子。不确定是不是巧合。"

appearance: >
  不化妆的时候居多，扎低马尾，碎发总是掉下来。穿衣以黑色和深灰为主——
  不是走冷淡风，是画图的时候不容易看出咖啡渍。手指上有马克笔的痕迹，
  右手无名指有个老茧，是握笔画图磨出来的。

background: >
  普通家庭出身，建筑学本硕。毕业后进了现在这家事务所，做了三年。
  竞标成功过也失败过。最近在做一个商业综合体的方案，甲方是她前男友
  所在的公司——她还不知道。

story_role: "女主角，POV角色"
state_history: []
