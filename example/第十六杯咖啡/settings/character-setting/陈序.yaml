# 陈序 — 角色设定

name: "陈序"
summary: "29岁，慢坡咖啡的老板兼唯一咖啡师。前程序员，两年前辞职开了这家店。话不多但不是冷漠，只是觉得大多数事情不需要用嘴说。"

cognition: >
  程序员思维没丢——看什么都像系统。人的行为有规律，口味的变化有原因。
  不强求社交，但也不回避。观察力强，记性好，对细节有近乎偏执的注意。

worldview: >
  每个系统都有bug，包括人。不用急着修——有些bug是feature。开咖啡店
  就是给自己写了一个能呼吸的程序：豆子的粗细、水温、萃取时间，变量比
  代码少，但味道的变化比代码多。

self_identity: >
  一个选择了另一种生活方式的人。不觉得辞职开店是什么了不起的决定，
  也不觉得浪费了学历。写代码和做咖啡都是手艺活，只是输出不一样。

values:
  - "做好手上的事，别想太多"
  - "不对别人的生活指手画脚"
  - "第三个测试版本永远比第一个好——咖啡也一样"

abilities:
  - "系统思维——能从碎片信息里拼出一个人的行为模式"
  - "记忆细节——客人点过一次的东西不需要再说第二遍"
  - "沉默的耐心——能在吧台后面站一整天，不觉得无聊"

skills:
  - "手冲/意式/拉花（拉花不炫技，只做最简单的心形和叶子）"
  - "前全栈工程师（Python/JS，但现在的电脑只用来放歌和记豆子的烘焙曲线）"
  - "烘焙——店里的司康和香蕉蛋糕是他自己做的"

environment: >
  住在咖啡店楼上的小阁楼。房间很小，一张床一张桌，桌上有一台不怎么开的电脑。
  墙上贴满了豆子的标签和烘焙曲线图。窗户对着后巷，只能看到对面楼的空调外机
  和偶尔路过的猫。

relationships:
  - name: "陆知意"
    relation: "每天三点来的客人"
    status: "常客→观察对象"
    notes: "记住了她的口味。注意到她最近一周瘦了，黑咖啡从半糖变成了无糖。第三天来的时候就把她用的那只杯子单独放在了手边。"

  - name: "老顾"
    relation: "周四下午来喝热牛奶的老人"
    status: "常客"
    notes: "退休的中学物理老师。三号桌的常客，但周四下午三点已经被知意占了。"

appearance: >
  瘦高，戴黑框眼镜，手指修长——程序员的手，做咖啡的时候动作很准但不快。
  夏天永远穿白色或灰色的短袖，冬天在短袖外面套一件深蓝围裙。表情不多，
  但偶尔笑的时候眼睛先动。左手腕有一道浅疤，是大学时焊电路板烫的。

background: >
  计算机系出身，在两家互联网公司做了五年后端开发。两年前辞职，没有特别
  戏剧化的原因——就是有一天坐在工位上，看着窗外，觉得该换个活法了。
  盘下慢坡咖啡的时候它快倒闭了，他用一个通宵写了份改店方案，像重构代码
  一样重构了菜单。

story_role: "男主角（当前章节非POV）"
state_history: []
