# vol-1-ch-1.yaml — 第一章「三点钟的客人」

volume: 1
chapter: 1
title: "三点钟的客人"

outline:
  summary: >
    建筑设计师陆知意在竞标项目的压力下，每天下午三点准时离开公司，
    步行十五分钟到老城区的慢坡咖啡，喝一杯黑咖啡，坐十五分钟，然后回去。
    这是她一天里唯一不被打扰的时间。她开始注意到这家店的一些细节——
    咖啡师是个话不多的瘦高男人，做咖啡的时候动作很准，店门口的木牌上
    每天写一句不一样的话。她不知道自己是什么时候开始注意这些的。
  key_points:
    - "公司下午的竞标讨论，知意被要求改方案的方向，不情愿但没争辩"
    - "三点钟她合上笔记本离开公司，走十五分钟去慢坡咖啡"
    - "推门进店，风铃响。点黑咖啡，坐在三号桌"
    - "十五分钟的喘息——看窗外、喝咖啡、让自己不思考"
    - "起身离开前注意到木牌上今天的字：'有些习惯不需要理由'"
    - "回公司的路上发现自己在想那个咖啡师的手——做咖啡的时候拇指按在粉锤上的方式"
  characters:
    - "陆知意"
    - "陈序"
    - "同事老周（一句话带过）"
  location: "建筑事务所办公室 → 老城区街道 → 慢坡咖啡"
  time: "下午两点四十五到三点二十"
  narrative_pov: "third_person_limited"

memo:
  current_task: "建立知意的日常模式和她与慢坡咖啡的第一次有意义的接触。让读者站稳——知道她是谁、她为什么来、这家店什么样。"
  reader_expectation:
    state: "新章节——没有前章积累"
    strategy: "制造新缺口"
    detail: "让读者在章末想知道：这个咖啡师注意到了她吗？她明天还会来吗？"
  payoff_plan:
    must_resolve: []
    must_hold:
      - "hook-001"
      - "hook-002"
      - "hook-004"
    partial_advance:
      - hook_id: "hook-003"
        advance: "建立知意对陈序的初步注意——观察他的手、做咖啡的节奏"
      - hook_id: "hook-005"
        advance: "知意出门前看了一眼窗台上的绿萝，叶子黄了一半——但没浇水"
  downtime_functions:
    - "知意从公司走到咖啡店的路程 → 建立老城区的物理空间和知意走路时的习惯"
    - "咖啡店里的十五分钟 → 建立店的空间、氛围、陈序的日常动作节奏"
  key_choices:
    - choice: "知意选择走十五分钟而不是在楼下买咖啡"
      driver: "不是逃避——是需要真正的十五分钟独处。楼下的咖啡店会遇到同事。"
      consistency: "符合她有边界感、不擅长社交的性格"
      reader_surprise: "读者会好奇为什么走这么远——但不会觉得不合理"
  required_changes:
    - "知意从'不知道这家店'到'记住了店里的几个物理细节'——对空间有了熟悉感"
    - "读者从她的视角认识了陈序——不是通过自我介绍，是通过观察他的动作"
  prohibitions:
    - "不要让陈序说超过三句话——他是被观察者，不是主动社交者"
    - "不要让知意主动搭讪——她来这里是躲人的"
    - "不要写直白心理活动——'她觉得这个咖啡师有点不一样'→删掉，写她观察到的具体细节"
    - "不要在章末写'她明天还会来'——用动作暗示，不陈述"

emotional_design:
  primary_mood: "日常松弛——微微的疲惫和压力下的一小块喘息"
  mood_progression: "办公室的压抑→走在路上的松弛→咖啡店里的安静→回程路上的微微好奇"
  intensity_peak: "结尾——她注意到木牌上的字，然后在回程路上发现自己在想他的手"
  satisfaction_beat: "读者在文字里真实地坐进了一家独立咖啡店——闻到了咖啡味、听到了蒸汽声、感受到了下午三点的阳光"
  emotional_hook: "好奇——她和他会有什么发展？她明天还来吗？"
  intensity_level: 3

  micro_payoffs:
    - type: "info"
      description: "知意在咖啡店里的十五分钟——真实的细节让读者'看到'了这家店"
      location: "中段"
    - type: "emotion"
      description: "结尾的轻微心动——她自己都没意识到的那种"
      location: "后段"

segments:
  - seg_number: 1
    function: "atmosphere"
    goal: "建立知意的办公环境——下午两点四十五，竞标讨论刚结束，空气里有打印机的热墨味和不情愿的妥协"
    what_to_write: >
      下午的竞标讨论持续了差不多一小时。会议室的玻璃墙上还贴着上一轮的方案草图，
      荧光灯管有一根在闪。知意合上笔记本的时候发现自己在桌面上按出了一排指印——
      刚才讨论方向的时候一直在用力压笔。老周说方案方向要调整，她没争辩。
      不是因为同意，是因为不想解释——改方案比改老板的想法快。回到工位的时候
      电脑右下角是两点四十五，她开始收拾东西准备出门。同事问去哪，她说楼下买咖啡。
    characters:
      - "陆知意"
      - "同事老周"
    emotional_tone: "微微的压抑和疲惫"
    word_target: 350
    ends_with: "她推开玻璃门走进走廊，身后的会议室里老周还在说话。"
    dialogue_intent: ""
    micro_payoff: null

  - seg_number: 2
    function: "character_beat"
    goal: "知意从公司走到慢坡咖啡的路上——展示她的步行习惯和老城区的物理质感"
    what_to_write: >
      从写字楼到老城区的路是一条往下的坡。走十五分钟，经过一家五金店、
      两家早餐铺（下午已经关了）、一颗歪脖子梧桐树。知意每天都走同样的路线，
      不是因为喜欢习惯，是因为这条路不需要动脑子。她需要这十五分钟把脑子里的
      方案草图清掉。手机在口袋里震了两下——工作群消息——她没看。空气里有
      炒菜的油烟味和梧桐叶的青涩味。走到坡中段，慢坡咖啡的木牌出现在右手边。
    characters:
      - "陆知意"
    emotional_tone: "逐渐松弛——从工作状态过渡到属于自己的时间"
    word_target: 300
    ends_with: "她推开门，门上的风铃响了一声——那种老式的铜铃，声音不脆，闷闷的。"
    dialogue_intent: ""
    micro_payoff: null

  - seg_number: 3
    function: "atmosphere"
    goal: "咖啡店内部空间建立——吧台、蒸汽声、陈序的动作、三号桌的阳光"
    what_to_write: >
      店里只有一个人——咖啡师在吧台后面低头调磨豆机。空气里有刚磨好的豆子味，
      偏酸，应该是浅烘的。知意在吧台前站了两秒，点了黑咖啡——不加糖。
      咖啡师点头，转身去萃取。意式机打蒸汽的声音很大，像旧公交车的气刹，
      知意每次听到都想笑，但从来没笑过。她扫了一眼店里，七八张桌子，
      只有三号桌有阳光——朝西的窗，下午三点光正好斜进来。她照旧坐在三号桌。
      墙上挂着一块小黑板，粉笔字写着今天的单品豆：埃塞俄比亚耶加雪菲。
      黑板下面是一个书架，上面是客人留下的书——有两排了，最旧的那本
      《城市设计》书脊已经快掉了。
    characters:
      - "陆知意"
      - "陈序"
    emotional_tone: "安静、放松——像按下了暂停键"
    word_target: 350
    ends_with: "咖啡端上来的时候，她发现杯子的温度和平时一样烫——不，好像更烫一点。"
    dialogue_intent: ""
    micro_payoff: null

  - seg_number: 4
    function: "character_beat"
    goal: "知意的十五分钟独处——和咖啡、阳光、不思考的自己待着"
    what_to_write: >
      她喝了一口咖啡。苦的，烫的，不加糖。最开始来的时候她喝半糖，
      最近改成了无糖——好像需要更明确的东西来对冲一天里模糊的部分。
      三号桌的桌面是老板木的，靠近边缘的地方有被人不小心用圆珠笔划出来的线，
      不知道是谁画的。窗外的坡道上偶尔有人经过，骑电动车的、遛狗的、
      手里提着菜的老人。她看着窗外，不刻意看什么，就是让眼睛休息。
      杯子里的咖啡从三分之二变成三分之一，最后见底。她看了一眼手机——
      三点十八。该回去了。但手里的杯子还烫着，她多坐了一分钟。
    characters:
      - "陆知意"
    emotional_tone: "安静的松弛——一天里最真实的一刻"
    word_target: 350
    ends_with: "她站起来，把杯子放回吧台上。杯底在木头上磕出一个闷响。"
    dialogue_intent: ""
    micro_payoff: null

  - seg_number: 5
    function: "emotional_landing"
    goal: "离开时的发现——木牌上的字、回程路上的思绪"
    what_to_write: >
      走到门口的时候她才注意到木牌上的字。不是菜单，是一句话——
      "有些习惯不需要理由。"字是用粉笔写的，笔画很轻，像是写的人
      不太确定这句话值不值得被看见。知意站了两秒，然后推门出去。
      回程是上坡。她走得很慢，脑子里没有方案也没什么具体的事——
      在想那个咖啡师的手。做咖啡的时候拇指按在粉锤上，用力均匀，
      不轻不重，像在做一件不需要证明什么的事。风铃的声音还在耳朵里。
      她发现自己在摸右手无名指那个握笔的老茧。
    characters:
      - "陆知意"
      - "陈序（作为观察对象出现在知意的思绪中）"
    emotional_tone: "微微的好奇和轻微的自我察觉——她还不知道这意味着什么"
    word_target: 350
    ends_with: "办公室的电梯门打开的时候，她按了12楼。手机屏幕上有一条未读消息，头像她认识——前男友的。她没点开。"
    dialogue_intent: ""
    micro_payoff: "emotion"

