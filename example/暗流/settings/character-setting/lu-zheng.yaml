# character.yaml - 陆征（主角）
name: "陆征"
summary: "前调查记者，现私家调查员。35岁，冷静克制，不善交际，骨子里有一股固执的正义感。"

cognition: "善于从碎片信息中发现模式和关联。面对混乱的信息，本能反应是梳理时间线和因果链。习惯性地怀疑一切表面合理的解释。"
worldview: "相信世界由利益驱动，但并不因此放弃自己的底线。认为真相本身就有价值，即使它不一定能改变结果。"
self_identity: "一个被系统排除在外但仍然试图从边缘施加影响的人。不再幻想改变世界，但无法容忍明明看到了却什么都不做。"
values: "真相高于便利。对自己的承诺必须兑现。不利用弱者的困境获利。"
abilities: "出色的信息搜集和交叉验证能力。能从一份文件、一通电话、一次偶遇中嗅到不寻常之处。"
skills: "调查记者时期积累的信息源网络。善于通过反复追问和交叉比对让谎言露出破绽。基本的跟踪和反跟踪技巧。"
environment: "在澜城老城区租了一间由旧仓库改建的办公室兼住处。窗外就是嘈杂的菜市场，每天在讨价还价声中醒来。"

relationships:
  - name: "陆小曼"
    relation: "女儿"
    status: "8岁，跟母亲住在邻市。每月见一次。陆征对自己缺席她的成长有深深的愧疚。"

appearance: "中等身材，偏瘦。常年穿着深色夹克，手上总有一杯凉掉的咖啡。眼角已经有了细纹，笑起来比不笑更让人有距离感。"
background: "新闻系毕业，在《澜城晚报》做了十年调查记者。三年前因一篇揭露港口地产商洗钱内幕的报道被报复——对方没动他，而是通过广告渠道给报社施压，他被辞退了。离婚与此直接相关。之后自己开了这家几乎没有正经生意的调查事务所。"
story_role: "protagonist"

state_history:
  - after_volume: 1
    after_chapter: 1
    location: "澜城老城区旧仓库改建二楼"
    status: "接受委托人周秀兰的委托，开始调查周雨桐失踪案。时隔三年重新买了一包烟，但没能点燃。"
    changes:
      - "接受了新的调查委托——寻找失踪的24岁女子周雨桐"
      - "三年未抽烟，此日买了一包烟（但两次都没点着火）"
      - "调查中发现周雨桐朋友圈定位地址查无此址，且该地址所在区域三年前已拆迁"
  - after_volume: 1
    after_chapter: 2
    location: "澜城港口大道西侧拆迁区→工业区货运中转站"
    status: "深入调查中。被灰色轿车无声警告，从目击者老韩处获知周雨桐被无牌面包车接走。"
    changes:
      - "在拆迁区搜索时被灰色轿车跟踪/警告"
      - "通过沉默和耐心撬开目击者老韩的嘴"
      - "获得关键线索：周雨桐被银灰色无牌面包车接走，方向指向澜港快运仓库"
  - after_volume: 1
    after_chapter: 3
    location: "回城路上→澜城（返程中）"
    status: "找到周雨桐并带回。收到针对性威胁短信，对方掌握他的家庭信息——威胁已从'调查对象'升级为'被调查对象'。"
    changes:
      - "通过闺蜜方敏找到周雨桐藏身地"
      - "获知失踪真相：物流公司双份不一致单据"
      - "获得双份单据复印件作为证据"
      - "回城路上收到虚拟号威胁短信——列出前妻和女儿的详细信息"
      - "三年前的洗钱案与当前失踪案被同一条短信链接"
