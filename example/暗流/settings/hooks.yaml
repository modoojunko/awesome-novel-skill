# hooks.yaml - 伏笔/钩子追踪
hooks:
  - id: "hook-001"
    description: "失踪者周雨桐最后一条朋友圈定位指向一个不存在地址"
    introduced_in: "1-1"
    status: "resolved"
    payoff_timing: "immediate"
    priority: 1
    hook_type: "clue"
    last_mentioned_chapter: "1-2"
    resolution_chapter: "1-3"
    notes: "1-3章收束：找到周雨桐。朋友圈坐标线索随失踪案结案闭合。"
  - id: "hook-002"
    description: "目击者老韩提到的'他们'——物流公司背后的组织"
    introduced_in: "1-2"
    status: "pending"
    payoff_timing: "near_term"
    priority: 1
    hook_type: "mystery"
    last_mentioned_chapter: "1-2"
    resolution_chapter: ""
    notes: "核心主线钩子。老韩说'这不是该管的事'。灰色轿车暗示有人在看守空地。"
  - id: "hook-003"
    description: "陆征三年前因揭露港口地产商洗钱内幕被报社辞退"
    introduced_in: "1-1"
    status: "mentioned"
    payoff_timing: "mid_arc"
    priority: 2
    hook_type: "relationship"
    last_mentioned_chapter: "1-3"
    resolution_chapter: ""
    notes: "第一章通过房租催缴和回忆提及。第三章威胁短信列出三年前事件细节——洗钱案与失踪案被同一方势力连接。"
hook_health_rules:
  payoff_distribution:
    immediate_max: 3
    near_term_max: 5
    mid_arc_max: 8
    slow_burn_max: 5
  stale_threshold:
    high_priority: 5
    normal_priority: 3
  no_burst_settlement: true
  no_orphan_hooks: true
hook_operations:
  upsert: "新增或更新钩子"
  mention: "本章提及已有钩子"
  resolve: "钩子在当前章收束"
  defer: "钩子收束推迟"
  abandon: "废弃钩子"
