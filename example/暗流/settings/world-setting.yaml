# world-setting.yaml - 世界设定
name: "澜城"
summary: "南方沿海港口城市，表面繁荣，暗处流动着走私、洗钱和地下交易。现实世界观，无超自然元素，时间设定为当下。"
details:
  geography: "南方沿海城市，天然深水港。老城区保留民国骑楼建筑，新城区是玻璃幕墙高楼。港口区与市区间有一片废弃工业区，是城市灰色地带。"
  politics: "地方势力盘根错节，港口生意被几个家族把持。市政府与商会关系密切，执法部门对流经港口的地下交易睁一只眼闭一只眼。"
  culture: "典型的南方商业城市文化——务实、精明、重视关系网络。早茶文化盛行，也是情报交换的场所。"
  history: "清末开埠，民国时期成为重要贸易中转站。改革开放后迅速发展为沿海经济重镇。近二十年经历从制造业到服务业的转型。"
  rules: "现实世界规则。无魔法、无超能力。社会的真实规则是金钱和关系网，明面法律与暗处利益交换并行。"
  physics: "现实物理规则。"
  biology: "现实生物学规则。"
  sociology: "阶级分化明显。港口资本既得利益者、城市中产、外来务工者、游离于主流社会之外的边缘群体构成多层次社会结构。"
