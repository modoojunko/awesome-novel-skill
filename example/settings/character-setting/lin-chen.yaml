# lin-chen.yaml - 林辰

name: "林辰"
name_pinyin: "lin-chen"
story_role: "protagonist"
age: 28
occupation: "程序员（后端开发）"

cognition: |
  理性、逻辑驱动。遇到异常时第一反应是寻找合理解释——疲劳、幻觉、光线问题。
  直到亲眼看到异物吞噬乘客，才被迫接受现实。接受后切换为工程师思维：观察、记录、寻找规律。

worldview: |
  "世界是可以被模型化的。"——这个信念支撑了他的职业生涯，也是他在面对时间裂缝时的主要武器。
  当发现世界不能完全用模型解释时，他没有崩溃，而是将"规则"从物理定律扩展为"待观测的未知规则"。

self_identity: |
  一个普通的、有点无聊的、加班太多的程序员。对自己没有宏大期待，只想做好工作、还完房贷、偶尔打打游戏。
  觉醒后开始质疑这个定位——如果世界上只有你能看到某些东西，你还是"普通人"吗？

values:
  - "真相本身有价值，即使它令人不安"
  - "假装看不见不会让问题消失"
  - "一个人被抹去而没有人记得——这不公平"

abilities:
  - name: "时间感知"
    description: "能在凌晨06:47感知时间裂缝的开启和关闭，伴有轻微的耳鸣"
  - name: "异物视觉"
    description: "能看到时间异物——普通人完全不可见"

skills:
  - "编程（Python/Go，六年经验）"
  - "系统化观察能力（职业病）"
  - "熬夜能力（加班练出来的）"

environment:
  physical: "城东老旧小区六楼公寓，一室一厅。窗外是另一栋楼的墙，采光很差。桌上永远有两台显示器和一杯冷掉的咖啡。"
  social: "独居。同事关系表面融洽，无深交。大学时期有过一个女友，分手后没再谈。母亲在老家，每周一次视频通话。"

state_history:
  - after_volume: 1
    after_chapter: 1
    location: "城东公寓"
    status: "刚在地铁上目睹异物吞噬乘客，震惊、怀疑、恐惧交织。决定调查。"
    changes:
      - "首次确认自己能看见常人看不见的东西（异物）"
      - "首次目睹异物吞噬活人"
      - "世界观从'世界是正常的'转变为'世界有隐藏层'"

  - after_volume: 1
    after_chapter: 2
    location: "城东公寓"
    status: "确认被吞噬者被世界抹去。发现自己被异物盯上。恐惧但决定继续追查。"
    changes:
      - "发现自己成为异物的'兴趣对象'"
      - "从被动目击转为主动调查"
      - "在网络上发现'观测者'群体的存在"
      - "意识到自己不再是普通上班族——生活轨迹已被永久改变"
