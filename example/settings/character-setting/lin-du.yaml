# lin-du.yaml - 林渡

name: "林渡"
name_pinyin: "lin-du"
story_role: "protagonist"
age: 23
occupation: "刚刚大学毕业，尚未就业"

cognition: |
  理性教育下的产物。大学专业是土木工程——这让他比祖父多了一套理解"结构"的语言，但他很快会发现墓的结构用任何工程学框架都无法解释。
  他回到青石村是因为祖父的遗言——不是出于信仰。直到墓开始呼吸之前，他都认为自己在履行一个形式上的义务。

worldview: |
  "世界上没有解释不了的东西，只有解释不清楚的人。"——这是他大学导师的口头禅，也是林渡过去四年学到的最核心的信念。
  古墓会用七天时间拆掉这个信念。

self_identity: |
  一个被迫回家的孙子。他对青石村没有归属感——六岁就被父母带到县城读书，只在寒暑假回来。
  祖父去世前他三年没回来过。这个事实他在第一章会反复回避，在第二章会被墓用祖父的声音砸在脸上。

values:
  - "欠下的要还"——这个来自祖父的朴素信念是他回来的唯一原因
  - "看见的东西才能信"——这个信念将在古墓呼吸的那一刻开始碎裂

abilities: []

skills:
  - "土木工程基础知识（足以让他对墓的结构产生专业的困惑）"
  - "听老人说话的耐心（祖父从小训练，他自己没意识到这个技能的存在）"

environment:
  physical: "林氏祖宅，青石砌成，两层楼。他的房间在二楼东侧，窗户正对后山的柏树林。从窗户看出去能看到通往古墓的石阶入口。祖父的房间在一楼西侧，桌上还放着没喝完的半杯茶。"
  social: "独自从县城回来。父母在他十岁时离婚，母亲再婚，父亲在南方打工。他在任何一个'家'里都像个访客。青石村是唯一一个有人等他回来的地方。"

state_history: []
