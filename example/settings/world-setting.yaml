# world-setting.yaml - 世界设定：凌晨六点四十七分

name: "凌晨六点四十七分"
summary: "表面正常的现代都市，每天凌晨06:47时间裂缝出现三分钟。异物从中渗出，吞噬的人会被世界抹去一切痕迹。少数觉醒者能看见。"

details:
  geography: |
    故事发生在一座无名的大型现代化都市。地铁网络发达，高楼林立，人群密度极高。
    关键地点：
    - 三号线地铁（末班车时段）：故事起点，封闭空间中时间裂缝最活跃
    - 林辰的公寓：城东老旧小区六楼，主角的安全区

  politics: |
    普通市民对时间裂缝一无所知。官方层面是否存在知情机构——目前未知。
    政府曾成立"特勤七处"调查异常事件，三个月后以"无实质发现"为由解散。
    真正的调查转入地下，由一个自称"观测者"的松散网络在暗中维持。

  culture: |
    当代都市文化，快节奏、高压力。人们对异常现象的第一反应是找理性解释——集体幻觉、疲劳、灯光问题。
    社交媒体上有零星讨论（"六点四十七分你在地铁上看到了什么"），但被当作都市传说。

  history: |
    时间裂缝的起源不明。第一份疑似记录出现在十七年前——一名地铁司机上报"隧道里有人影但不是人"。
    六点四十七分这个时间点，据推测与十七年前某次未公开的实验事故有关。
    具体关联——尚未查明。

  rules: |
    核心规则：
    1. 时间裂缝每天只在凌晨 06:47 出现，持续约三分钟
    2. 异物从裂缝渗出，普通人肉眼不可见
    3. 异物吞噬的人会从世界中被"抹去"——所有记录消失，所有记忆被改写
    4. 少数人天生能感知异物（"觉醒者"），成因不明
    5. 异物对觉醒者表现出兴趣——但尚未表现出攻击性
    6. 被抹去者的社会网络会自动重织，世界像一个自我修复的有机体

  physics: |
    物理规则与真实世界一致，例外仅发生在时间裂缝附近：
    - 裂缝周围三米内，时钟减速（机械表和电子表均受影响）
    - 空气密度轻微变化（有耳鸣感）
    - 温度下降约五度
    这些现象只有觉醒者能感知。

  biology: |
    异物（时间生物）：
    - 外观：无固定形态。林辰感知为"半透明的、缓慢蠕动的暗色团块，边缘模糊，像热浪上方扭曲的空气"
    - 行为：缓慢漂移，趋向人群密集处。吞噬过程约十秒，被吞噬者不会发出声音
    - 弱点：未知。与异物的任何形式的接触后果——未知
    - 数量：目前只观察到单只。是否存在更多——未知

  sociology: |
    被抹去者的社会影响：
    - 同事会说"那个工位本来就没坐人"，并真的相信这一点
    - 社交账号和聊天记录全部消失，仿佛从未注册
    - 直系亲属的记忆会被改写——一个母亲会忘记自己有过孩子
    - 物理痕迹可能残存——一张照片的角落里还可能看到被抹去者的衣角
