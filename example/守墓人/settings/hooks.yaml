# hooks.yaml - 伏笔/钩子追踪
# 基于 InkOS 的 Hook Lifecycle-Aware Scheduling
# 追踪跨章节伏笔的全生命周期：pending → mentioned → resolved → abandoned

hooks:
  - id: "hook-001"
    description: "失踪者周雨桐最后一条朋友圈定位指向一个导航查不到的地址"
    introduced_in: "1-1"
    status: "pending"
    payoff_timing: "immediate"
    priority: 1
    hook_type: "clue"
    last_mentioned_chapter: "1-2"
    resolution_chapter: "1-3"
    notes: "1-3章收束：找到周雨桐。朋友圈定位仍是不存在地址，该线索随失踪案解决而闭合"

  - id: "hook-002"
    description: "目击者老韩提到的'他们'——物流公司背后的组织"
    introduced_in: "1-2"
    status: "pending"
    payoff_timing: "near_term"
    priority: 1
    hook_type: "mystery"
    last_mentioned_chapter: "1-2"
    resolution_chapter: ""
    notes: "老韩说'这不是该管的事'——暗示组织有威慑力。灰色轿车暗示有人在看守那片空地"

  - id: "hook-003"
    description: "陆征三年前因揭露港口地产商洗钱内幕被报社辞退"
    introduced_in: "1-1"
    status: "mentioned"
    payoff_timing: "mid_arc"
    priority: 2
    hook_type: "relationship"
    last_mentioned_chapter: "1-3"
    resolution_chapter: ""
    notes: "第一章通过房租催缴通知和回忆片段提及。第三章威胁短信直接列出三年前事件细节——三年前的洗钱案与当前失踪案被同一方势力连接。本卷内不完全展开"

# 钩子健康检查规则（借鉴 InkOS Auditor 的 hook health analysis）
hook_health_rules:
  # 同类型钩子在不同 payoff 区间的合理分布
  payoff_distribution:
    immediate_max: 3     # immediate 区间最多同时存在 3 个未收束钩子
    near_term_max: 5     # near_term 区间最多 5 个
    mid_arc_max: 8       # mid_arc 区间最多 8 个
    slow_burn_max: 5     # slow_burn 区间最多 5 个

  # 钩子陈旧度检测：超过 N 章未被提及的钩子标记为 stale
  stale_threshold:
    high_priority: 5     # 高优先级钩子超过 5 章未提及 → 警告
    normal_priority: 3   # 普通钩子超过 3 章未提及 → 警告

  # 不允许的钩子状态
  no_burst_settlement: true   # 不允许同一章内集中收束 3 个以上钩子
  no_orphan_hooks: true       # 不允许 abandoned 钩子关联到活跃角色/主线

# 钩子操作语义（借鉴 InkOS 的 upsert/mention/resolve/defer）
hook_operations:
  upsert: "新增或更新钩子（同一钩子跨章演进时更新描述和 last_mentioned）"
  mention: "本章提及已有钩子，更新 last_mentioned_chapter"
  resolve: "钩子在当前章收束，填入 resolution_chapter"
  defer: "钩子收束推迟（需说明理由和新的 payoff 预期）"
  abandon: "废弃钩子（仅当主线方向改变时，需注明原因）"
