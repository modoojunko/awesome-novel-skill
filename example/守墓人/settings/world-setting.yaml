# world-setting.yaml - 世界设定：守墓人

name: "守墓人"
summary: "与世隔绝的山村青石村，林氏家族世代守护一座上古墓穴。古墓每六十年从内部发出一次有节奏的震动——'呼吸'。墓中封印着什么，但三百年来从未被证实。"

details:
  geography: |
    青石村位于北方山区腹地，三面环山，唯一进出的是一条废弃已久的碎石公路。
    村子建在向阳的缓坡上，三十多户人家，最老的房子是林家的祖宅——青石砌成，地基比村中任何建筑都深。
    古墓在祖宅后方半山腰，入口是一整块三米高的青石板，没有任何铭文或雕刻。墓周围没有墓碑、没有祭坛、没有任何标识。它只是山体上的一个被封住的洞口。
    祖宅到古墓需要走两百多级石阶，石阶两侧是野生的柏树。无论季节，古墓方圆五十米内不长任何植物。

  politics: |
    青石村与外界几乎没有行政联系。名义上属于最近的县城管辖，但实际上村里的事由林家族长决定——而现在，族长是林渡。
    政府曾在八十年代派过一支考察队，报告写的是"普通地质构造"，此后无人过问。那份报告的编号和存档位置——都找不到了。

  culture: |
    青石村没有文字史书。关于古墓的一切通过林氏家族的口头传承：每一代守墓人必须亲自告诉下一代。
    村里其他人不参与守墓，但遵守三条祖训：不靠近古墓、不在墓周围取土、不在六十年周期内嫁娶。
    最后一条已经没人遵守了。年轻人大多离开了村子。

  history: |
    据林氏口传，三百年前林家先祖与"墓中之物"达成了某种约定——林家守护封印，墓中之物不越界。
    约定具体内容已失传。唯一留存的是守墓人的职责描述："守在入口，直到它醒了。"
    "它"是什么，"醒了"意味着什么——每一代守墓人都有自己的猜测。林渡的祖父在笔记中写道："它不是在沉睡。它在等。"
    六十年呼吸周期有精确记录：每六十年整，古墓会发出有节奏的震动，每次持续七天。第一次记录在三百年前，最近一次——三天后。

  rules:
    - "古墓每六十年呼吸一次，持续七天，从不偏差。"
    - "守墓人必须在呼吸周期内守在墓前。为什么——祖父的笔记只说'它会知道你在不在'。"
    - "墓门只有守墓人能打开。怎么打开——祖父说'你到时候会知道'。林渡认为这纯粹是推诿。"
    - "墓方圆五十米内寸草不生。不是土壤问题——移走的土样在实验室里能正常种植。"

  physics: |
    物理规则与真实世界一致，已确认的异常仅一项：墓的"呼吸"。
    震动频率约每分钟四次，每次震动的振幅和波形与人类平静呼吸的波形几乎一致。
    震动期间，墓周围的空气温度不降，但人在墓前会感到寒冷——不是皮肤上的冷，是骨头里的冷。

  biology: |
    墓方圆五十米内的土壤检测结果：pH中性，有机物含量正常，微生物种群——零。
    不是"很少"。是无菌状态。样本在任何温度下都无法培养出任何微生物。
    这个结果被祖父的笔记记录为"墓在清理自己的房间"。

  sociology: |
    青石村的人口从百年前的五百多人缩减到现在的不到一百人，且多为老人。
    林渡是村里唯一的年轻人。他的回归引起了村民的关注——不是因为好奇，而是因为他们等了很久。
    "你爷爷说你不会回来的。他说你可能不想回来。但你回来了。"
