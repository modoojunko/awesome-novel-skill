# lin-du.yaml - 林渡

name: "林渡"
name_pinyin: "lin-du"
story_role: "protagonist"
age: 23
occupation: "刚刚大学毕业，尚未就业"

cognition: |
  理性教育下的产物。大学专业是土木工程——这让他比祖父多了一套理解"结构"的语言，但他很快会发现墓的结构用任何工程学框架都无法解释。
  他回到青石村是因为祖父的遗言——不是出于信仰。直到墓开始呼吸之前，他都认为自己在履行一个形式上的义务。

worldview: |
  "世界上没有解释不了的东西，只有解释不清楚的人。"——这是他大学导师的口头禅，也是林渡过去四年学到的最核心的信念。
  古墓会用七天时间拆掉这个信念。

self_identity: |
  一个被迫回家的孙子。他对青石村没有归属感——六岁就被父母带到县城读书，只在寒暑假回来。
  祖父去世前他三年没回来过。这个事实他在第一章会反复回避，在第二章会被墓用祖父的声音砸在脸上。

values:
  - "欠下的要还"——这个来自祖父的朴素信念是他回来的唯一原因
  - "看见的东西才能信"——这个信念将在古墓呼吸的那一刻开始碎裂

abilities: []

skills:
  - "土木工程基础知识（足以让他对墓的结构产生专业的困惑）"
  - "听老人说话的耐心（祖父从小训练，他自己没意识到这个技能的存在）"

environment:
  physical: "林氏祖宅，青石砌成，两层楼。他的房间在二楼东侧，窗户正对后山的柏树林。从窗户看出去能看到通往古墓的石阶入口。祖父的房间在一楼西侧，桌上还放着没喝完的半杯茶。"
  social: "独自从县城回来。父母在他十岁时离婚，母亲再婚，父亲在南方打工。他在任何一个'家'里都像个访客。青石村是唯一一个有人等他回来的地方。"

state_history:
  - after_volume: 1
    after_chapter: 1
    location: "林氏祖宅"
    status: "刚回村，找到祖父的遗言。尚未面对古墓的真实性——仍认为在履行形式上的义务。"
    changes:
      - "发现祖父的布面笔记本，记录了三百年的呼吸周期数据"
      - "读到祖父的遗言——'如果你回来，去墓前守着'"
      - "第一次独自走上通往古墓的两百级石阶"

  - after_volume: 1
    after_chapter: 2
    location: "林氏祖宅→古墓前"
    status: "世界观被粉碎。亲眼看到墓呼吸、听到祖父的声音从墓门缝隙传出。收到神秘短信。"
    changes:
      - "工程学框架无法解释古墓的呼吸现象"
      - "确认祖父的声音从墓中传出——'你来了。我等你很久了'"
      - "收到匿名短信：'六十年等的是什么'"
      - "从'不信'转变为'被迫接受异常是真实的'"

  - after_volume: 1
    after_chapter: 3
    location: "林氏祖宅"
    status: "发现了六年前进过墓的陌生人留下的黑色皮面笔记本。对墓的认知从'封印'转变为'它坐在里面等待'。敲门声从祖宅门内侧传来——外面的世界和里面的世界都在推他。手指触碰了门栓。"
    changes:
      - "在祖父笔记本数据页中发现隐藏的铅笔点标记序列，间隔越来越短"
      - "从张婶处得知六年前有人进过墓，再没出来"
      - "找到陌生人留下的黑色小皮本，内容指向墓不是封印而是'坐等'"
      - "祖宅门从内侧被敲响——节奏与墓呼吸一致"
      - "第一次主动选择——手指碰到了门栓，但尚未决定要不要开门"
