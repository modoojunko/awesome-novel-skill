# volume-1.yaml - 第一卷：苏醒

title: "苏醒"
volume: 1
summary: |
  林渡回到阔别三年的青石村，继承祖父的守墓人职责。他不相信任何传说——直到古墓在他面前开始呼吸。
  祖父的笔记指向一个林渡不敢面对的可能性：祖父不是死了，是"进去了"。
  墓打开一条缝，用祖父的声音叫了他的名字。

chapters_summary:
  - chapter: 1
    title: "继承"
    summary: "林渡接到祖父去世的消息，回到青石村。在老宅中他发现祖父留下的笔记，记录着古墓的'呼吸周期'——每六十年一次，下次就在三天后。笔记的最后一页写着：'如果你回来，去墓前守着。如果你没回来——那就没回来吧。'"

  - chapter: 2
    title: "呼吸"
    summary: "三天后的午夜，林渡在墓前守夜。墓石开始有节奏地起伏——每分钟四次，像人的呼吸。持续七分钟的震动后，墓门开了一条缝。从缝里传出的不是风，是一个声音，用祖父的语气叫了他的全名，然后说：'你来了。我等你很久了。'"

  - chapter: 3
    title: "敲门的人"
    summary: "林渡追查那条神秘短信，发现号码归属一个废弃的镇子。他重新翻看祖父的笔记本，在数据页中发现了铅笔点的隐藏模式——被标记的日期指向六年前一个进过墓的人。张婶告诉他有那样一个人来过，上了山，再没下来。当晚，祖宅的门从内侧被敲响——节奏和墓的呼吸一模一样。"

core_conflict: "理性与超自然之间的碰撞——林渡的工程学训练告诉他墓不可能'呼吸'，但他的感官告诉他这一切正在发生。更深的冲突：敲门声从内而来——外面的世界和里面的世界都在推他。"
character_arc: "从'履行形式上的义务'到'被迫面对家族使命的真实重量'，到'第一次主动选择要不要开门'"
