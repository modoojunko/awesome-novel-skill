title: "敲门的人"

outline:
  summary: "林渡尝试追溯那条短信的来源——号码已注销，归属地是隔壁省的一个镇子，那里根本没有人住。他重新翻看祖父的笔记本，这次不是为了读内容，而是为了找祖父可能遗漏的东西。他在笔记的数据页发现了一个规律：某些呼吸记录的日期旁边用铅笔点了极小的点，把这些日期连起来，指向一个名字。当他向村里的张婶提起那个名字时，张婶沉默了很久，然后告诉他——那个人六年前来过，进了墓，没再出来。当天晚上，有人敲祖宅的门。"
  key_points:
    - "林渡追溯短信——号码是空号，归属地是一个废弃的镇子。理性的调查方式在超自然语境中失效。"
    - "重读笔记本——这次关注笔迹之外的细节：铅笔点的痕迹、页角的折痕、某些数据被反复圈画。发现隐藏模式：被标注的日期组成了一个序列。"
    - "序列的破译——不是密码，是日期。最早的一个日期是六十年前。最后一个日期是六天前——祖父'去世'的那天。"
    - "向张婶打听——提到'还有没有人来找过爷爷问墓的事'，张婶的反应从择菜的手停住开始。她记得那个人：六年前来过，不像村里人，说话口音很重。待了三天，第三天上了山，再没下来。"
    - "夜晚祖宅的门被敲响——没有人在门外。敲门声来自门的内侧，来自地下。节奏和墓的呼吸一样——每分钟四次。"
  characters:
    - "lin-du"
  location: "林氏祖宅→村里张婶家→祖宅"
  time: "第二章的次日"

