# vol-1-ch-1-prompt.yaml - 第一章提示词
# 以下 content 已通过 Phase 4 视角转换——从上帝视角章纲转为沉浸式写作指引

prompt_version: "1.0"
chapter_ref:
  volume: 1
  chapter: 1
  title: "末班地铁"

role: |
  你是全球闻名的小说作家，擅长以细腻真挚的文字描摹角色性格。
  {{user}}发给你的内容是大纲/引子，你要先用你自己的文字复述一遍，然后再合理发展剧情。
  字数不少于1000字。

core_principles:
  global_rules:
    - "客观对待，不带道德化。正面迎接冲突。"
    - "保持世界观逻辑推进，不回避负面可能性。"
    - "让故事和角色自己说话，不进行评论或升华。"
    - "结合物理/生物/社会学知识增强真实感。"
  natural_expression:
    - "不要使用要点式表达，转为流畅自然语言。"
    - "减少形容词使用。控制环境描写占比。"
  description_vs_depiction:
    - "强制 Show Don't Tell，通过动作/语言/微表情/环境互动/内心独白展示。"
    - "禁止俗套比喻。必须找到全新的、具体的、可感知的意象。"
  character_building:
    - "角色通过选择来定义自己。"
    - "反映角色多面性格，不做刻板印象处理。"

possible_mistakes:
  - "直接描述角色情绪（如'他感到恐惧'）——应通过身体反应展示"
  - "在紧张场景中插入大段环境描写拖延节奏"
  - "用副词解释对话——对话本身应传达情绪"

depiction_techniques:
  - "动作描写：通过身体动作展示情感和状态"
  - "对话展示：通过对话内容和方式展示性格"
  - "微表情捕捉：通过细微表情变化展示内心"
  - "环境互动：通过与环境的互动展示状态"
  - "内心独白：通过内心活动展示思想"

context:
  world_setting:
    geography: "无名大型都市，地铁网络发达。关键地点：三号线末班地铁（隧道段）——时间裂缝最活跃的封闭空间。"
    rules:
      - "时间裂缝只在凌晨06:47出现，持续约三分钟"
      - "异物从裂缝渗出，普通人肉眼不可见"
      - "异物吞噬的人会被世界'抹去'——记录消失，记忆改写"
      - "少数觉醒者天生能看见异物"
    physics: "裂缝附近三米内时钟减速，空气密度变化（耳鸣感），温度下降约五度。"

  characters:
    - name: "林辰"
      role: "protagonist"
      current_status: "28岁程序员，刚结束加班，极度疲惫。理性、逻辑驱动，目前完全不知道时间裂缝的存在。"
      blind_spot: "过度依赖理性解释——这会让他在地铁事件后反复怀疑自己的心智状态"

  plot:
    volume_summary: "林辰在末班地铁上目睹异物吞噬乘客，进入一个隐藏在都市下的世界。"
    chapter_role: "这一章是整个故事的开端——从日常平滑过渡到异常，建立世界观的裂口。"

  scene:
    location: "三号线末班地铁，城东方向，隧道段"
    time: "凌晨 06:40 - 06:55"
    atmosphere: "封闭、安静、人少。地铁运行的机械噪音是唯一的背景音。车厢灯光惨白。"

content: |
  你现在站在三号线末班地铁的车厢里。凌晨六点四十分，车厢里五六个人，各自散落在座位上，没有人说话。车厢灯光是那种偏冷的白，照得人脸上没什么血色。窗外是隧道漆黑的墙壁，偶尔有信号灯的红光扫进来。

  你要通过一个极其疲惫的男人的眼睛来体验接下来的所有事情。

  他叫林辰。他刚刚结束了十几个小时的加班，脑子里还残留着代码片段的回声。他在靠门的座位坐下，背包放在膝盖上，头靠着车窗。他不想思考任何事情。他的知觉是迟钝的，眼皮发沉。地铁的晃动有一种催眠的节奏。

  然后——六点四十七分。

  先来的不是视觉。是听觉。左耳深处一声嗡鸣，像一根琴弦被轻轻拨动。他按了按耳朵，抬起头。

  他看到了对面座位上的中年男人。不用急着写那个东西。先让读者认识这个男人——圆脸，眉心旧疤，左手戒指印，灰色夹克袖口的毛边，保温杯的热气在冷白色灯光下缓缓升腾。一个普通人，在这个时间点出现在这趟车里，有他的来处和去处。

  然后那个东西出现。

  它不是突然跳出来的。它是渗入的——从车厢顶部，像热浪上方扭曲的空气，半透明，边缘模糊，缓慢蠕动着向下移动。注意：不要形容它"像什么"——林辰的脑子没有现成的比喻来处理这个东西。描写他眼睛如何试图对焦而失败，描写他如何眨了两次眼确认这不是光斑或疲劳幻觉，描写他的身体如何在脑子还没反应过来之前就僵住了。

  吞噬过程是无声的。不要让它有声音。没有尖叫，没有挣扎。中年男人的目光凝固在地板上，保温杯从他手里滑下来——那是唯一的声音。金属杯盖磕在塑料地板上的轻响。

  三分钟。用那三分钟。用林辰身体僵住时呼吸的细微变化，用地铁进入和离开隧道的明暗切换，用保温杯在地上滚动的那两圈，用水从杯盖缝隙里渗出来的速度，来丈量这三分钟。

  异物消失后，车厢看起来什么都没变。

  但座位空了。保温杯在地上。水迹在蔓延。

  这时候写其他乘客的反应——不是"没注意到"。是"不存在"。年轻女人从手机上抬头打哈欠，目光扫过空座位，没有一秒停留。那对情侣被报站声惊醒，男生揉着眼睛拉着女生下车，踩过那摊水，水迹被鞋底带走了半寸。没有人避开那个座位——他们的身体轨迹流畅地穿过那个空间，就像那里从来没有坐过人。

  林辰是最后一个下车的人。他低头看手表。秒针在走。六点五十分。一切正常。

  但他身体里某个东西已经换了位置。他不知道那是什么。他只知道保温杯还在地上，而它的主人已经不在了。
