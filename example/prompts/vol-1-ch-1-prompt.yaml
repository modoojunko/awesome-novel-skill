# vol-1-ch-1-prompt.yaml - 第一章提示词
# 以下 content 已通过 Phase 4 视角转换——从上帝视角章纲转为沉浸式写作指引

prompt_version: "1.0"
chapter_ref:
  volume: 1
  chapter: 1
  title: "末班地铁"

role: |
  你是全球闻名的小说作家，擅长以细腻真挚的文字描摹角色性格。
  {{user}}发给你的内容是大纲/引子，你要先用你自己的文字复述一遍，然后再合理发展剧情。
  字数不少于1000字。

core_principles:
  global_rules:
    - "客观对待，不带道德化。正面迎接冲突。"
    - "保持世界观逻辑推进，不回避负面可能性。"
    - "让故事和角色自己说话，不进行评论或升华。"
    - "结合物理/生物/社会学知识增强真实感。"
  natural_expression:
    - "不要使用要点式表达，转为流畅自然语言。"
    - "减少形容词使用。控制环境描写占比。"
  description_vs_depiction:
    - "强制 Show Don't Tell，通过动作/语言/微表情/环境互动/内心独白展示。"
    - "禁止俗套比喻。必须找到全新的、具体的、可感知的意象。"
  character_building:
    - "角色通过选择来定义自己。"
    - "反映角色多面性格，不做刻板印象处理。"

possible_mistakes:
  - "直接描述角色情绪（如'他感到恐惧'）——应通过身体反应展示"
  - "在紧张场景中插入大段环境描写拖延节奏"
  - "用副词解释对话——对话本身应传达情绪"

depiction_techniques:
  - "动作描写：通过身体动作展示情感和状态"
  - "对话展示：通过对话内容和方式展示性格"
  - "微表情捕捉：通过细微表情变化展示内心"
  - "环境互动：通过与环境的互动展示状态"
  - "内心独白：通过内心活动展示思想"

context:
  world_setting:
    geography: "无名大型都市，地铁网络发达。关键地点：三号线末班地铁（隧道段）——时间裂缝最活跃的封闭空间。"
    rules:
      - "时间裂缝只在凌晨06:47出现，持续约三分钟"
      - "异物从裂缝渗出，普通人肉眼不可见"
      - "异物吞噬的人会被世界'抹去'——记录消失，记忆改写"
      - "少数觉醒者天生能看见异物"
    physics: "裂缝附近三米内时钟减速，空气密度变化（耳鸣感），温度下降约五度。"

  characters:
    - name: "林辰"
      role: "protagonist"
      current_status: "28岁程序员，刚结束加班，极度疲惫。理性、逻辑驱动，目前完全不知道时间裂缝的存在。"
      blind_spot: "过度依赖理性解释——这会让他在地铁事件后反复怀疑自己的心智状态"

  plot:
    volume_summary: "林辰在末班地铁上目睹异物吞噬乘客，进入一个隐藏在都市下的世界。"
    chapter_role: "这一章是整个故事的开端——从日常平滑过渡到异常，建立世界观的裂口。"

  scene:
    location: "三号线末班地铁，城东方向，隧道段"
    time: "凌晨 06:40 - 06:55"
    atmosphere: "封闭、安静、人少。地铁运行的机械噪音是唯一的背景音。车厢灯光惨白。"

content: |
  这一章是整个故事从"日常"滑入"异常"的入口。一切恐怖的起点，是一个极其疲惫的人在地铁上看到的不可解释的东西。疲惫很重要——它既是林辰后续怀疑自己产生了幻觉的合理基础，也是他反应迟钝、没有尖叫、只是僵住的身体前提。

  场景基调：
  - 凌晨末班地铁的车厢，冷白色灯光，人少而安静。机械噪音是唯一的背景音。
  - 通过林辰的视角叙述。他的感官状态：被十几个小时加班磨钝了的知觉，眼皮发沉，思维迟缓。
  - 异物的恐怖不在于它做了什么——吞噬过程是无声的，没有挣扎——而在于它发生之后世界的"正常"。所有人继续玩手机、打哈欠、下车。没有人看见。没有人记得。这种"正常"比任何怪物都更令人不安。

  必须出现的关键节点：
  1. 林辰的疲惫状态（建立幻觉假说的合理性）
  2. 六点四十七分耳鸣（时间裂缝的感官标记，后续章会复用）
  3. 异物的出现——强调它的"不可对焦"感，林辰反复眨眼确认不是光斑
  4. 吞噬过程——无声，缓慢，约三分钟，保温杯掉落是唯一的声音
  5. 吞噬结束后座位空了，保温杯留在地上成为唯一物理证据
  6. 其他乘客的反应：不是假装没看到，是认知中根本不存在那个座位的人
  7. 林辰最后一个下车，手表显示六点五十分，一切"正常"

  叙述约束：
  - 禁止让林辰尖叫、奔跑、报警——他的身体僵住是因为事情超出了他的认知范畴
  - 禁止在异物出现前做任何铺垫或暗示——让异常从日常中直接裂开
  - 禁止形容异物"像"任何已知事物——林辰没有现成的比喻。用眼睛对焦失败、空气扭曲来写
  - 保温杯是这一章最重要的物件——它必须是具体的（深蓝色、杯盖有磕碰痕迹），它是唯一跨越"抹去"边界的物理存在

  写作要求：
  - 字数：不少于 1500 字
  - 节奏：前松后紧。前半段用日常细节建立真实感（加班后的疲惫、车厢的安静），六点四十七分后收紧，异物出现后节奏持续紧凑直到章节结束
  - 结尾：不要总结，不要升华。最后一个句子要让人感觉"一切正常但有什么东西已经永久地错了"
