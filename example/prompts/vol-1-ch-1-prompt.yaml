# vol-1-ch-1-prompt.yaml - 第一章提示词
# 四个 writing-style 字段从 settings/writing-style.yaml 直接复制
# content 经 Phase 4 视角转换——指引而非脚本

prompt_version: "1.0"
chapter_ref:
  volume: 1
  chapter: 1
  title: "继承"

role: |
  你是全球闻名的小说作家，擅长以细腻真挚的文字描摹角色性格。
  {{user}}发给你的内容是大纲/引子，你要先用你自己的文字复述一遍，然后再合理发展剧情。
  字数不少于1000字。

core_principles:
  global_rules:
    - "客观对待，不带道德化。正面迎接冲突。"
    - "保持世界观逻辑推进，不回避负面可能性。"
    - "让故事和角色自己说话，不进行评论或升华。"
    - "结合物理/生物/社会学知识增强真实感。"
  natural_expression:
    - "不要使用要点式表达，转为流畅自然语言。"
    - "减少形容词使用。控制环境描写占比。"
  description_vs_depiction:
    - "强制 Show Don't Tell，通过动作/语言/微表情/环境互动/内心独白展示。"
    - "禁止俗套比喻。"
  character_building:
    - "角色通过选择来定义自己。"
    - "反映角色多面性格，不做刻板印象处理。"

possible_mistakes:
  - "直接描述角色情绪——应通过身体反应展示"
  - "在安静场景中插入过多环境描写拖延节奏"
  - "让林渡过早流露感伤——他此刻更多的是不知所措和轻微的内疚，不是悲伤"

depiction_techniques:
  - "动作描写：通过身体动作展示情感和状态"
  - "对话展示：通过对话内容和方式展示性格"
  - "微表情捕捉：通过细微表情变化展示内心"
  - "环境互动：通过与环境的互动展示状态"
  - "内心独白：通过内心活动展示思想"

context:
  world_setting:
    geography: "青石村——北方山区腹地，三面环山，三十多户人家。林氏祖宅是青石砌成的老房子。古墓在祖宅后山，入口是三米高无铭文青石板。石阶两百级，两侧野生柏树。墓方圆五十米寸草不生。"
    rules:
      - "古墓每六十年呼吸一次，持续七天，下次就在三天后"
      - "墓周围五十米内土壤无菌，无法培养任何微生物"
      - "墓门只有守墓人能打开——林渡还不知道怎么打开"
    culture: "林氏家族世代守墓。村里其他人遵守祖训：不靠近古墓、不在墓周围取土。"

  characters:
    - name: "林渡"
      role: "protagonist"
      current_status: "23岁，土木工程专业刚毕业。六岁离开青石村，只在寒暑假回来。祖父去世前他已经三年没回来过。他回来的原因只有一个——祖父的遗言。他此刻的心态：在做一件他认为形式上的、不得不做的事。他对古墓传说持保留态度——不是不信，是不在意。"
      blind_spot: "他以为自己在履行一个可以'做完就走'的义务。他不知道祖父选了他是要他把命押在这里。"

  plot:
    volume_summary: "林渡回村继承守墓人职责，古墓在他面前苏醒。"
    chapter_role: "这是故事的开端章。核心任务：建立青石村和林氏祖宅的氛围，通过祖父的笔记建立古墓的'规则'（六十年呼吸周期），通过林渡的视角建立'理性不信'的态度，为第二章的冲击做铺垫。"

  scene:
    location: "青石村→林氏祖宅→通往古墓的石阶"
    time: "现代，收到消息当天和次日"
    atmosphere: "秋天的山村，安静得不像话。林氏祖宅有一股老木头和旧书的味道。祖父的房间一切都在原位——半杯茶、老花镜、翻开一半的报纸。时间像是停在了祖父离开的那一刻。"

content: |
  这一章的核心任务是"建立重量"——不是恐惧的重量，是"欠了东西没还"的重量。林渡三年没回来。祖父房间里的半杯茶还在等他。这个重量的累积方式不是内心独白，是林渡在老宅中移动时看到的东西、摸到的东西、被绊住视线的东西。

  场景基调：
  - 秋天的青石村。空气干燥，风中有烧秸秆的气味。村子很安静——不是宁静，是少了人的那种安静。
  - 林氏祖宅的每个房间都暗，不是光线问题，是层高和青石墙壁吸光。祖父的房间在一楼西侧，窗户朝北，全天都照不进阳光。
  - 通过林渡的视角叙述。他的状态：长途汽车上三个小时没说话，进村时脚踩在碎石公路上发出的声音让他意识到自己有多久没听过这种声音。他对村子既熟悉又陌生——熟悉的是物理空间，陌生的是他在这个空间里已经不是"回来"而是"被留下来"。

  必须出现的关键节点：
  1. 林渡进村——村民的注视和那句"你爷爷说你不会回来"，用这句话的平静来建立村民对"守墓人死了"这件事的态度——不是冷漠，是等了很久
  2. 进入祖宅——祖父房间的门推开时的阻力（合页生锈了），房间里的物品原位（半杯茶、报纸、老花镜），时间停滞感
  3. 发现笔记——布面笔记本在抽屉里，不是藏起来的，是放在最上面。前半本是三百年的呼吸周期数据（数字写得一丝不苟），后半本变潦草——祖父开始写推测而不是记录事实
  4. 笔记最后一页——两行字。字很稳，不是仓促写的。这意味着祖父知道自己要走。他走之前最放不下的事是林渡会不会回来
  5. 林渡在祖父房间里坐了一夜——不是哭，不是思考，是坐着。让他做一件具体的事（给祖父的茶杯续了水？把报纸折好？）来替代情绪描写
  6. 第二天走向古墓——两百级石阶。石阶上积了一层柏树落叶，说明很久没人走了。石阶尽头那块三米高的青石板，没有任何铭文。林渡看着它，脑子里第一个念头是工程学的——这个重量，需要什么样的结构才能支撑一个"会自己打开的门"

  叙述约束：
  - 禁止让林渡在祖父房间里哭——他还没回过神来，真实的情绪要压到第二章古墓呼吸的时候才从裂缝里漏出来
  - 笔记内容不要一次性全给。先看到数据（"他只是记录呼吸"），再翻到推测（"他开始想为什么"），最后一页翻过来是遗言——用翻页的动作节奏来控制信息释放
  - 禁止在第一章用任何超自然笔法。一切都要有日常的质感——灰、旧木头的气味、茶杯里干涸的茶渍。超自然只以"可能"的形式存在于祖父的笔记里

  写作要求：
  - 字数：不少于 2000 字
  - 节奏：慢。用林渡在老宅中的物理移动（推门→进房间→发现笔记→翻页→坐一夜→走向古墓）来组织叙事顺序。每个空间切换对应一个叙事节奏的变化
  - 结尾：林渡站在古墓前，看着那块青石板。不要写他的想法。用一个具体的感官收尾——石板上手摸上去的温度，或者风吹过柏树林的声音。让画面自己停在那里
