# vol-1-ch-2-prompt.yaml - 第二章提示词
# 四个 writing-style 字段从 settings/writing-style.yaml 直接复制
# content 经 Phase 4 视角转换——指引而非脚本

prompt_version: "1.0"
chapter_ref:
  volume: 1
  chapter: 2
  title: "呼吸"

role: |
  你是全球闻名的小说作家，擅长以细腻真挚的文字描摹角色性格。
  {{user}}发给你的内容是大纲/引子，你要先用你自己的文字复述一遍，然后再合理发展剧情。
  字数不少于1000字。

core_principles:
  global_rules:
    - "客观对待，不带道德化。正面迎接冲突。"
    - "保持世界观逻辑推进，不回避负面可能性。"
    - "让故事和角色自己说话，不进行评论或升华。"
    - "结合物理/生物/社会学知识增强真实感。"
  natural_expression:
    - "不要使用要点式表达，转为流畅自然语言。"
    - "减少形容词使用。控制环境描写占比。"
  description_vs_depiction:
    - "强制 Show Don't Tell，通过动作/语言/微表情/环境互动/内心独白展示。"
    - "禁止俗套比喻。"
  character_building:
    - "角色通过选择来定义自己。"
    - "反映角色多面性格，不做刻板印象处理。"

possible_mistakes:
  - "直接描述角色情绪——应通过身体反应展示"
  - "在恐怖场景中插入大段环境描写拖延节奏"
  - "让林渡在被叫到名字的瞬间就接受'墓里有东西'——他的第一反应应该仍然是工程学解释，即使他自己都不信"

depiction_techniques:
  - "动作描写：通过身体动作展示情感和状态"
  - "对话展示：通过对话内容和方式展示性格"
  - "微表情捕捉：通过细微表情变化展示内心"
  - "环境互动：通过与环境的互动展示状态"
  - "内心独白：通过内心活动展示思想"

context:
  world_setting:
    geography: "古墓在半山腰，入口是三米高无铭文青石板。墓前有一片压实的空地，石阶尽头正对墓门。墓周围五十米内寸草不生——边界是一条清晰的弧线，线外是杂草和柏树，线内是裸土。"
    rules:
      - "古墓每六十年呼吸一次，持续七天。呼吸时地面有节奏地震动，每分钟约四次。"
      - "呼吸期间人在墓前会感到骨子里的寒冷——不是皮肤上的冷。"
      - "墓门只有守墓人能打开。触发方式——未知。林渡此时对此一无所知。"
    physics: "震动频率和振幅与人类平静呼吸的波形几乎一致。林渡的工程学训练让他注意到了这个数据——他在第一章翻笔记时看到了这个波形图。"

  characters:
    - name: "林渡"
      role: "protagonist"
      current_status: "已经在古墓前守了三天。这三天他试图用地下水、热胀冷缩、火车经过、小型地震来解释即将到来的'呼吸'，每一项都被他在脑中模拟后推翻。他此刻坐在墓前石阶上，觉得自己非常愚蠢。一个土木工程毕业生，大半夜守着一块石板。但他没有走。"
      blind_spot: "他在笔记中看到祖父记录的波形图时，他的工程学大脑捕捉到的第一反应是'这个波形我见过'——人的呼吸波形。但他把这个念头压下去了。这个被压下去的认知就是本章要引爆的炸弹。"

  plot:
    volume_summary: "林渡回村继承守墓人职责，古墓在他面前苏醒。"
    previous_chapter: "林渡回到青石村，在祖父的笔记中发现了古墓的呼吸周期——下次就在三天后。他在祖父房间坐了一夜，第二天第一次走上了通往古墓的两百级石阶。"
    chapter_role: "这是从'理性解释一切'到'有什么东西在墓里用我爷爷的声音叫我的名字'的转折章。古墓的物理异常（震动、开门）是第一阶段冲击，声音是第二阶段——前者拆掉世界观，后者打在情感要害上。"

  scene:
    location: "古墓前的石阶和空地"
    time: "第一章三天后的午夜"
    atmosphere: "山里的午夜没有声音。不是安静——是死寂。没有虫鸣，没有风声。林渡的手电筒是唯一的光源。光照在青石板上，石板表面有微弱的反光——像是云母或者别的什么矿石。但这种反光在白天看不到。"

content: |
  这一章的核心是"无能为力"。林渡在震动开始之前还有理论，震动开始之后理论碎了一个，门开了之后又碎了一个，祖父的声音出现之后——他什么都没有了。这个递进过程不要让林渡思考，让他的身体替他反应。他脑子里还在拼工程学解释的时候，他的手已经在发抖了。

  场景基调：
  - 午夜的古墓前。绝对的安静——山里的夜晚通常有虫鸣，但墓周围没有。五十米寸草不生的边界不只是植物不生长，是生物不靠近。
  - 林渡独自一人，手电筒的光照在青石板上。他坐了三个小时。他的状态：膝盖上放着一本翻旧了的工程力学教材——他试图用计算来稳定自己。计算什么？石板的自重、可能的支点位置、如果它是门需要多大的力才能推开。他算不出来。所有的参数都是假设。
  - 震动开始前不要给任何预兆。不要写风停、不要写温度骤降、不要写任何"似乎有事情要发生"的暗示。让异常从日常中裂开——就像第一章异物从日常地铁中渗入一样。林渡可能正在翻书页，或者正在搓手取暖。

  必须出现的关键节点：
  1. 震动前的寂静——林渡在做一件很日常的事（翻笔记？搓手？看表等时间？），他的心态是半信半疑加一点自嘲
  2. 震动开始——不是地震的横波或纵波，是从脚底正下方传上来的有节奏的震动。写震动本身——林渡的手电筒光在石板上抖动，石阶上的碎石子被震得轻微跳动
  3. 林渡试图用理性捕捉——他在默数频率，大脑自动跳到工程学数据库（"地下水？这频率太规整了。热胀冷缩？没有温度变化。"），与此同时他的手已经开始发抖了——他还没意识到自己在怕
  4. 呼吸持续七分钟——用这七分钟。用林渡手表秒针的走动，用手电筒光束的抖动幅度变化，用他把手指按在石板上的触感（石板在呼吸），用骨子里的冷来计量。不是皮肤觉得冷——是骨头里往外散发的冷
  5. 呼吸停止——不是逐渐减弱，是突然停止。然后比呼吸期间更可怕的寂静。林渡在这寂静中听到自己的呼吸——他在喘，自己都没意识到
  6. 石门开了——青石板没有移动，是"放松"了。像一扇关了很久的门被从内侧轻轻推了一下，开了一条缝。不要写它"吱呀作响"，老墓门没有声音——正是没有声音才更可怕
  7. 声音——不是风声穿过缝隙，是一个人的声音，有语气，有停顿。先叫他的全名，包括一个只有祖父还在用的称呼，然后说"你来了。我等你很久了。"语气和他祖父一模一样，不紧不慢。林渡对这句话的反应是本章的终点——不要写他尖叫或逃跑，写他僵住，写手电筒的光在门缝上游走，写他看到石板表面有东西在动——或者没有动，是他自己的手在抖

  叙述约束：
  - 禁止用"突然""猛然""竟然"制造惊吓——这一章的力量不在于惊吓，在于林渡的理性被一寸一寸碾碎的过程
  - 禁止在声音出现后让林渡与声音对话——他此刻不该有任何语言反应能力
  - 禁止解释声音是谁或是什么——这章的终点是林渡听到了这句话，不是他理解这句话

  写作要求：
  - 字数：不少于 2500 字
  - 节奏：三段式。震前（缓慢，日常，一丝不耐烦）→ 震中（收紧，每分钟四次震动的节奏推进，七分钟不间断）→ 震后（声音出现，时间被拉长，每个字之间都像隔了很久）
  - 结尾：声音说完那句话后，不要结束在震惊。结束在一个很小的、很具体的画面上——林渡握着手电筒，手电筒的光还在石板上，石板缝隙里的黑暗没有反射任何光。留白
