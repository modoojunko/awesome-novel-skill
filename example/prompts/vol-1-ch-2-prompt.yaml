# vol-1-ch-2-prompt.yaml - 第二章提示词
# 以下 content 已通过 Phase 4 视角转换——从上帝视角章纲转为沉浸式写作指引

prompt_version: "1.0"
chapter_ref:
  volume: 1
  chapter: 2
  title: "被抹去的人"

role: |
  你是全球闻名的小说作家，擅长以细腻真挚的文字描摹角色性格。
  {{user}}发给你的内容是大纲/引子，你要先用你自己的文字复述一遍，然后再合理发展剧情。
  字数不少于1000字。

core_principles:
  global_rules:
    - "客观对待，不带道德化。正面迎接冲突。"
    - "保持世界观逻辑推进，不回避负面可能性。"
    - "让故事和角色自己说话，不进行评论或升华。"
    - "结合物理/生物/社会学知识增强真实感。"
  natural_expression:
    - "不要使用要点式表达，转为流畅自然语言。"
    - "减少形容词使用。控制环境描写占比。"
  description_vs_depiction:
    - "强制 Show Don't Tell，通过动作/语言/微表情/环境互动/内心独白展示。"
    - "禁止俗套比喻。必须找到全新的、具体的、可感知的意象。"
  character_building:
    - "角色通过选择来定义自己。"
    - "反映角色多面性格，不做刻板印象处理。"

possible_mistakes:
  - "直接描述角色情绪——应通过身体反应展示"
  - "在紧张场景中插入大段环境描写拖延节奏"
  - "让林辰过早接受'异物的存在'——他此刻仍然在用理性对抗，这是角色弧光的起点"

depiction_techniques:
  - "动作描写：通过身体动作展示情感和状态"
  - "对话展示：通过对话内容和方式展示性格"
  - "微表情捕捉：通过细微表情变化展示内心"
  - "环境互动：通过与环境的互动展示状态"
  - "内心独白：通过内心活动展示思想"

context:
  world_setting:
    geography: "林辰的公寓（城东老旧小区六楼）、中山路地铁站监控室。"
    rules:
      - "异物吞噬的人会被世界'抹去'——所有记录消失，所有记忆被改写"
      - "物理痕迹可能残存（保温杯出现在监控画面中，但持有者不在）"
      - "异物对觉醒者表现出兴趣"
    physics: "林辰能通过左耳嗡鸣感知异物接近。"

  characters:
    - name: "林辰"
      role: "protagonist"
      current_status: "刚在地铁上经历了无法解释的事件。处于理性与感知的剧烈冲突中。他在反复怀疑自己的心智——这是本章的核心心理驱动力。"
      blind_spot: "他以为自己在'调查真相'——但实际上他也在试图证明自己没有疯。这个动机比'追寻真相'更原始，也更容易让他犯错。"

  plot:
    volume_summary: "林辰在末班地铁上目睹异物吞噬乘客，进入一个隐藏在都市下的世界。"
    previous_chapter: "林辰在末班地铁上看到一个半透明的暗色异物吞噬了一名中年乘客。其他乘客毫无反应。保温杯成为唯一物理证据。"
    chapter_role: "这是从'目击事件'到'主动调查'的转折章。林辰试图用调查来证明自己没有疯，但调查的每一步都在加剧他的恐惧。"

  scene:
    locations: "林辰的公寓（调查阶段）→ 中山路地铁站监控室（证据收集阶段）→ 林辰的公寓（夜间对峙阶段）"
    time: "第一章次日开始，持续约一周"
    atmosphere: "从白天的理性调查（明亮、紧张、有目的感）过渡到夜晚的恐惧（黑暗、独处、被窥视感）。节奏从急到缓到窒。"

content: |
  这一章的核心驱动力是林辰试图用调查来回答一个他自己都不敢问的问题："我是不是疯了？" 他表面在追查"被吞噬的人是谁"，但底层动机更原始——他需要证明自己的感知是真实的。这个动机比"追寻真相"更脆弱，也更容易让他犯错。让这个动机贯穿全章。

  三个场景的情绪走向：

  场景一（白天·公寓）：调查——焦虑但有序。林辰用程序员的职业本能对抗恐惧：搜索、记录、比对。细节的精确程度就是他精神状态的晴雨表——他能记住中年男人脸上的旧疤、袖子上的油渍、杯盖的磕碰痕迹，这说明不是梦。但搜索结果是"没有这个人"——不是没找到，是不存在。用他在键盘和鼠标上的手指动作来承载情绪，不需要告诉他"他害怕"。

  场景二（下午·监控室）：证据——恐惧升级。监控画面中座位是空的，但保温杯悬浮着被空气握着、被空气放下、被空气摔落。物理证据存在于画面中，但人不存在——这比什么都看不到更可怕。安防员的反应是关键：他看不见保温杯，不是无视，是从认知层面被排除。林辰在这一刻彻底确认了两件事：一，自己没疯；二，疯不疯已经不重要了，现实本身出了问题。

  场景三（夜晚·公寓）：对峙——安静的恐怖。林辰开着所有灯躺在床上。左耳嗡鸣。窗外那团东西在看他。四十秒的对视不需要动作和对话，用床单的褶皱、被压平的呼吸、天花板上扫过的车灯光带来承载。异物消失的方式是"消失"——不是移开，是从时间线上被直接剪掉。之后林辰在凌晨三点十七分发匿名帖，正文删了又删，只敢确认"有没有人也看到"——不敢提脸，不敢提保温杯，不敢提窗外的东西。

  全章收束点：第二天下午的私信。"你也看到了，对吧。"——七个字。不要展开。这是下一章的钩子，留白即可。

  叙述约束：
  - 林辰在这一章不允许接受"异物真实存在"——他始终在理性解释和感官证据之间摇摆
  - 禁止在林辰独处时用内心独白直接说出情绪。用动作、身体反应、与环境的互动来展示
  - 监控室场景不要写安防员的心理——只写他说了什么、做了什么。他的"看不见"本身就是最有力的恐怖

  写作要求：
  - 字数：不少于 1800 字
  - 节奏：三个场景形成"紧→松→窒"的波浪。调查阶段是紧绷的焦虑，监控室是短暂的"确认"（我没疯——但现实出了问题），夜间对峙是缓慢的窒息。三个场景之间的过渡要留有呼吸感
  - 结尾：私信七个字单独成段。不要任何解释或展开。让读者和林辰同时愣住
