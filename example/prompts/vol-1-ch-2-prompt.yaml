# vol-1-ch-2-prompt.yaml - 第二章提示词
# 以下 content 已通过 Phase 4 视角转换——从上帝视角章纲转为沉浸式写作指引

prompt_version: "1.0"
chapter_ref:
  volume: 1
  chapter: 2
  title: "被抹去的人"

role: |
  你是全球闻名的小说作家，擅长以细腻真挚的文字描摹角色性格。
  {{user}}发给你的内容是大纲/引子，你要先用你自己的文字复述一遍，然后再合理发展剧情。
  字数不少于1000字。

core_principles:
  global_rules:
    - "客观对待，不带道德化。正面迎接冲突。"
    - "保持世界观逻辑推进，不回避负面可能性。"
    - "让故事和角色自己说话，不进行评论或升华。"
    - "结合物理/生物/社会学知识增强真实感。"
  natural_expression:
    - "不要使用要点式表达，转为流畅自然语言。"
    - "减少形容词使用。控制环境描写占比。"
  description_vs_depiction:
    - "强制 Show Don't Tell，通过动作/语言/微表情/环境互动/内心独白展示。"
    - "禁止俗套比喻。必须找到全新的、具体的、可感知的意象。"
  character_building:
    - "角色通过选择来定义自己。"
    - "反映角色多面性格，不做刻板印象处理。"

possible_mistakes:
  - "直接描述角色情绪——应通过身体反应展示"
  - "在紧张场景中插入大段环境描写拖延节奏"
  - "让林辰过早接受'异物的存在'——他此刻仍然在用理性对抗，这是角色弧光的起点"

depiction_techniques:
  - "动作描写：通过身体动作展示情感和状态"
  - "对话展示：通过对话内容和方式展示性格"
  - "微表情捕捉：通过细微表情变化展示内心"
  - "环境互动：通过与环境的互动展示状态"
  - "内心独白：通过内心活动展示思想"

context:
  world_setting:
    geography: "林辰的公寓（城东老旧小区六楼）、中山路地铁站监控室。"
    rules:
      - "异物吞噬的人会被世界'抹去'——所有记录消失，所有记忆被改写"
      - "物理痕迹可能残存（保温杯出现在监控画面中，但持有者不在）"
      - "异物对觉醒者表现出兴趣"
    physics: "林辰能通过左耳嗡鸣感知异物接近。"

  characters:
    - name: "林辰"
      role: "protagonist"
      current_status: "刚在地铁上经历了无法解释的事件。处于理性与感知的剧烈冲突中。他在反复怀疑自己的心智——这是本章的核心心理驱动力。"
      blind_spot: "他以为自己在'调查真相'——但实际上他也在试图证明自己没有疯。这个动机比'追寻真相'更原始，也更容易让他犯错。"

  plot:
    volume_summary: "林辰在末班地铁上目睹异物吞噬乘客，进入一个隐藏在都市下的世界。"
    previous_chapter: "林辰在末班地铁上看到一个半透明的暗色异物吞噬了一名中年乘客。其他乘客毫无反应。保温杯成为唯一物理证据。"
    chapter_role: "这是从'目击事件'到'主动调查'的转折章。林辰试图用调查来证明自己没有疯，但调查的每一步都在加剧他的恐惧。"

  scene:
    locations: "林辰的公寓（调查阶段）→ 中山路地铁站监控室（证据收集阶段）→ 林辰的公寓（夜间对峙阶段）"
    time: "第一章次日开始，持续约一周"
    atmosphere: "从白天的理性调查（明亮、紧张、有目的感）过渡到夜晚的恐惧（黑暗、独处、被窥视感）。节奏从急到缓到窒。"

content: |
  你现在站在林辰的公寓里。第二天早上。他没有去上班。他请了病假。他坐在电脑前。

  先不要写他的恐惧。先写他的行动。他是一个程序员——他的第一反应不是恐慌，是搜索。这是他的职业本能，也是他目前为止唯一能抓住的秩序感。

  写他打开浏览器。写他的手指悬在键盘上方，停了几秒，才开始打字。写他搜索的关键词打了又删——他在筛选措辞，因为他不知道怎么描述一个不存在的东西才不会让自己看起来像个疯子。

  然后写他记起了那张脸。

  不是模糊的印象。是细节。中年男人的圆脸。眉心那道发白的旧疤。左手无名指的戒指压痕——那种刚摘掉不久的、还没完全消失的痕迹。灰色夹克袖口的磨损。右手袖子上的油渍。深蓝色保温杯杯盖的磕碰。

  用这些细节的精确程度来展示他的精神状态——他在用细节的完整性来对抗恐惧。如果他能记住那么多，那就不是一个梦。如果他能验证其中一个细节，他就没有疯。

  然后写他搜索。一个平台接着一个平台。关键词组合越来越偏。结果越来越少。写他的手指在鼠标上收紧的力度。写屏幕上记事本里满屏的特征描述，像一份法医报告。

  然后写"没有"。

  不是"没有找到"。是"没有这个人"。写他把鼠标推到一边。写他放在膝盖上的手——手指的抖动。写他如何用力按自己的手指，指节咔嗒一声。他在用痛觉来锚定现实。

  下午去地铁站的监控室。这个场景的核心悬念不是"监控里有什么"——读者已经猜到监控里看不到人。核心悬念是"保温杯"。那个保温杯还在不在？如果保温杯也不在——那他昨晚经历的一切可能真的是幻觉。如果保温杯在——那物理证据与肉眼所见之间的裂缝，比时间裂缝本身更可怕。

  监控画面：林辰看到自己的身影进入车厢。对面座位——空的。但保温杯在。悬浮着。被空气握着，被空气放下，被空气摔落。深蓝色的杯身滚了两圈。杯盖摔开。水漏出来。所有这些都被记录在屏幕上。但那个人——不在。

  写这一刻他呼吸停止的长度。用秒来数。然后写安防员。不用写太多他们的对话——安防员就一句"什么杯子？"就够了。他看不到。不是不想看。是看不见。保温杯还在画面里，但它不在他的感知范围内。

  晚上。林辰开着所有的灯躺在床上。

  然后左耳嗡鸣。

  然后窗外——隔着六楼的空气——那个东西在看他。

  对视。四十秒。用那四十秒。不要写林辰的恐惧，写他手掌下的床单被攥出的褶皱。写他的呼吸——不是屏住，是被压平，浅得几乎不存在。写窗外的车灯偶尔扫过天花板，光带滑过，他和那个东西之间的空气在微微扭曲。写那个东西消失的方式——不是移开，不是飞走，是消失。就像从一条时间线上被直接剪掉了。

  然后写他在凌晨三点十七分打开匿名论坛。写帖子的标题。写正文怎么删减——他只想确认一件事。他不敢提脸。不敢提保温杯。不敢提窗外。

  然后写第二天下午收到的私信。七个字。不用多写。那七个字就是本章的终点。给读者一秒时间去理解——屏幕对面有人。不止他一个人。然后结束。
