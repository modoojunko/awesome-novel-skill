# 陈远征 — 省厅积案督导
name: "陈远征"
pinyin: "Chen Yuanzheng"
summary: "省厅刑侦总队二处副处长（积案督导），一级警督。1994年曾带队勘查白岛失踪现场——那是他刑警生涯中一直未能放下的案子。"

# === 身份 ===
identity:
  role: "权力人物 / 旧案执念者 / 暗线指挥"
  arc_role: "体制高层的推动者 / 历史的见证者"
