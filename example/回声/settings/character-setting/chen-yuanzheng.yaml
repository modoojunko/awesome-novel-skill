  gender: "男"
  occupation: "省公安厅刑侦总队二处副处长（积案督导）"
  rank: "一级警督"
  current_responsibility: "积案督导——负责推动省内未破积案的复查"
  previous_post: "1994年任临港市局刑侦支队副支队长"

# === 性格 ===
personality:
  traits:
    - "执着——1994年的案子他放不下，30年后仍在关注"
    - "务实——懂得在体制内迂回前进（明面上不再碰白岛案，暗中布下周铭这条线）"
    - "有耐心——等了三十年，在等到一个契机"
    - "观察力——注意到鬼喊洞支洞封堵的异常，但当时未深究"
  weaknesses:
    - "曾被压制——1994年被迫停手，在他心里留下未完成的遗憾"
    - "受限于省厅层级——虽然关注积案，但不能直接指挥市局办案"
    - "# 待确认 是否有时过于谨慎，错失时机？"
  notable_quote:
    - "对周铭说：'临港水很深，白岛案子有线索跟我说一声'"
    - "评价江成：'他太想破这个案子了。'"

# === 动机 ===
motivation:
  core_drive: "解开1994年白岛疗养院失踪案的真相——这是他30年来的未了之结"
  professional_drive: "作为积案督导，推动未破积案的重查是他的职责"
  personal_stake: "极高——1994年他亲眼看到只有去没有回的脚印和整齐摆放的拖鞋，被施压停手。这个案子定义了他职业生涯的'未完成'。后来被'上调'省厅，本质上是明升暗调。"
  internal_conflict: "作为省厅官员不能直接插手市局案件 vs 作为老刑警放不下的案子。他选择了建立暗线（周铭）的迂回方式。"

# === 背景故事 ===
backstory:
  1994_investigation:
    role: "临港市局刑侦支队副支队长，带队勘查白岛疗养院失踪现场"
    key_observations:
      - "现场脚印只去不回——失踪者走上岛后没有走回来的痕迹"
      - "拖鞋整齐放在岸边——不像慌乱离开"
    suppression:
      suppressor: "刑侦支队长马国良"
      additional_pressure: "铁路系统领导"
      method: "马国良声称'已和政法委沟通'，要求陈远征停止调查"
      consequence: "案子以'病人自行走失'结案。陈远征随后被'上调'省厅——实际上是明升暗调，让他远离临港。"
  post_1994:
    career_shift: "调任省厅刑侦总队 → 后来负责积案督导（二处副处长）"
    ongoing_attention:
      - "注意到鬼喊洞某个支洞尽头有人工封堵痕迹，但当时未深究"
      - "对白岛案持续关注30年，等待契机"
      - "安排周铭下派临港时交代暗线任务"
  relation_to_jiang_cheng: "陈远征知道江成是谁——苏榕的儿子。他评价江成'太想破这个案子了'，暗示他了解江成的执念，也许在他身上看到了年轻时的自己。"

# === 角色弧光 ===
arc:
  current_state: "省厅积案督导，通过周铭这条暗线关注临港的动态。曹斌案出现后，白岛线索重新浮现，他等待的机会可能来了。"
  expected_development:
    - "曹斌案可能成为推动白岛积案重查的契机"
    - "可能与江成建立直接联系——两代刑警因同一个案子交汇"
    - "他手中可能掌握着1994年调查中未被公开的信息"
    - "需要面对当年的施压者（马国良已退休但可能仍在世），完成30年前未完成的对抗"
  potential_outcomes:
    - "推动白岛案正式重查，为自己30年的执念画上句号"
    - "或再次被体制力量压制，但这次他不会退让"
    - "# 待确认"

