# world-setting.yaml - 《回声》世界设定
# 由 exec-world 整合设定圆桌 5 位 Agent 的问答记录生成

name: "回声"
summary: >
  临港市，一座依山面海的南方沿海城市。老城巷道盘踞山脚，新城沿月牙湾海岸线延伸。
  1994年白岛疗养院失踪案如同一根暗刺，扎在这座"表面开放、内里封闭"的城市肌理中。
  二十余年后，文创园一具尸体将旧案重新撬开——刑侦支队副支队长江成发现，
  死者手腕上的旧疤痕，与他母亲失踪前笔记中描述的如出一辙。

details:
  # ============================================================
  # 地理（来源：地理师）
  # ============================================================
  geography:
    overview: >
      临港市位于南方沿海，一面靠山一面临海。老城区依山而建，巷道阶梯错综复杂；
      新城区沿海岸线延伸，规划规整。城市东侧有废弃工业码头区，正改造为文创园。
      近海有三座岛屿，北郊有喀斯特山洞群。

    old_town:
      location: 山脚地带
      streets:
        - 三条东西走向的横街
        - 十几条南北走向的阶梯巷
      key_area:
        name: 青石街
        location: 老城区中段
        features:
          - 清代天后宫（妈祖庙）
          - 4-5口古井沿街大致等距排列
          - 中老年原住民为主，年轻人大多搬走
          - 民宿和奶茶店逐渐替代老店铺

    new_town:
      location: 沿海岸线延伸
      character: 规划规整，白领和开发区投资者聚居

    islands:
      - name: 贝壳岛
        distance_from_shore: 约2公里
        description: 旅游景点，有定期渡轮
      - name: 蛇岛
        distance_from_shore: 约5公里
        description: 无人居住，礁石多
      - name: 白岛
        distance_from_shore: 约12公里
        description: >
          废弃疗养院所在地。疗养院建于1970年代，原为铁路系统职工疗养院，
          1990年代改制后废弃。官方原因：淡水井旱季干涸、补给成本高。
          民间另有说法：1994年发生失踪事件，之后怪谈不断，工作人员不愿上岛。
          岛北侧退潮时露出礁石滩，为唯一非码头登陆点。废弃码头已腐朽，
          灯塔仍在自动运行。水深15-25米，有潮汐断层。

    karst_caves:
      location: 北郊，距市中心约20公里
      area: 约5平方公里
      local_name: "鬼喊洞"（因风吹洞穴发出啸叫声得名）
      cave_count: 7-8个主要洞穴
      underground_river: 一条地下暗河系统贯穿其中
      landmark:
        - 主洞有1958年勘探标记和60-70年代涂鸦
        - 有一个支洞尽头存在人工封堵痕迹（水泥砂浆掺海沙，封堵体不厚，似仓促施工）
      historical_use:
        - 解放前为"躲兵洞"
        - 1958年勘探队扩挖
        - 后不知何时被封堵，无人承认
      folk_activity: 七月半放河灯

    underground_water:
      geological_report: 1980年代地质队报告显示老城区地下有古河道遗迹
      connectivity:
        confirmed: false
        rumors:
          - 民间传闻北郊暗河有一条支流通往老城区地下（从未被证实）
          - 传说有小孩将桶扔入山洞后从老城某处漂出（无书面记录）
      well_phenomenon:
        - 青石街古井水位与潮汐有联动现象
        - 老城区有些老房子的井口在暴雨天会听到异常水声

    coastline:
      main_beach: 月牙湾（沙滩为主）
      north_south: 礁石岸
      landing_on_white_island:
        official: 无（码头已腐朽）
        alternative: 岛北侧退潮时露出礁石滩

    key_locations:
      - name: 临港市公安局
        position: 新老城区交界处临港大道
        distance_to_old_town: 约3公里
        distance_to_cultural_park: 约5公里
        sub_stations:
          - 老城派出所
          - 新城派出所
          - 港口派出所
      - name: 废弃码头/文创园
        position: 城市东侧
        status: 正改造为文创园
        note: 无公安监控，仅文创园自装网络摄像头
      - name: 回声酒吧
        position: 文创园内
        note: 核心据点，老板为前记者

  # ============================================================
  # 政治/权力格局（来源：政治师）
  # ============================================================
  politics:
    overview: >
      临港市公安局受市政法委和省公安厅双重领导，局长兼任副市长。
      临港经济技术开发区管委会（副厅级，省里直管）管辖港口区和文创园片区，
      与市辖区之间存在管辖权模糊地带。内部存在本地派与空降派的隐性对立，
      省厅刑侦总队对白岛旧案有所关注。

    power_structure:
      superior_bodies:
        - 市政法委（双重领导之一）
        - 省公安厅（双重领导之一）
      special_entity:
        name: 临港经济技术开发区管委会
        level: 副厅级
        affiliation: 省里直管
        jurisdiction: 港口区和文创园片区
      jurisdictional_ambiguity:
        port_area:
          rule: "先到先管，24小时移交"
          detail: 码头作业区归开发区港口公安处，外围归市局港口派出所
        cultural_park: 联合执法

    internal_factions:
      - faction: 本地派
        leader: 赵海涛
        background: 从基层干起30年
        stance_on_white_island: "过去的事了，没必要翻"
      - faction: 空降派
        leader: 周铭
        background: 省厅下派，分管刑侦
        secret_link: 与省厅陈远征有暗线联系

    key_figures:
      - name: 赵海涛
        title: 临港市副市长兼公安局局长
        rank: 三级警监
        faction: 本地派
        relationship_to_protagonist: 对江成有知遇之恩，但白岛案态度令江成无法信任
      - name: 周铭
        title: 临港市公安局副局长（分管刑侦）
        rank: 二级警督
        faction: 空降派
        notes:
          - 知道江成的母亲是苏榕（唯一在临港市局知道此背景的人）
          - 下派时陈远征对他说："临港水很深，白岛案子有线索跟我说一声"
      - name: 陈远征
        title: 省厅刑侦总队二处副处长（积案督导）
        rank: 一级警督
        historical_role: 1994年任临港市刑侦支队副支队长，带队勘查白岛现场
        personal_stake: 对白岛案有个人情结——当年被迫停手
        secret_channel: 与周铭存在绕过赵海涛的暗线（"陈↔周"）

    the_1994_coverup:
      original_investigator: 陈远征（时任刑侦支队副支队长）
      key_findings_at_scene:
        - 现场脚印只去不回
        - 拖鞋整齐放在岸边
      suppression_chain:
        - 刑侦支队长马国良（已退休）
        - 铁路系统领导
      method: 马国良声称"已和政法委沟通"，陈远征被迫停手，随后被"上调"至省厅
      current_obstruction:
        - 原始卷宗不完整
        - 现场照片底片"丢失"
        - 物证袋仅有衣物和拖鞋，DNA降解严重
        - 马国良称"记不清了"
        - 疗养院档案在铁路分局档案室，调取需正式手续

  # ============================================================
  # 文化（来源：文化师）
  # ============================================================
  culture:
    overview: >
      临港是一座"表面开放、内里封闭"的城市。人们礼貌但不交底，
      "不该问的别问"是社会默契。要突破信息壁垒，只能通过茶摊、酒桌、
      渔友关系这类非正式渠道。

    belief_system:
      main_deity: 妈祖（天后宫主神）
      side_halls:
        - 土地公
        - "山神"——清末舍身救渔民的船工，被民间自发封神
      worship_pattern:
        active: 春节和妈祖诞辰（农历三月二十三），商家捐香火
        daily: 由"妈祖婆"（老年妇女群体）维持日常香火
        youth: 年轻一代基本不拜
      key_figure:
        name: 阿珍婆
        age: 80多岁
        role: 妈祖婆群体成员
        secret: 1994年在码头见过苏榕等船——穿便服拎小包，不像要出远门。从未对人说过此事

    urban_legends:
      white_island:
        - legend: "白岛每隔十二年收一个人"
        - years: 1994年、2006年、2018年
        - details:
            - 1994: 失踪事件（流传最广的版本："病人被白岛上的东西带走"；另有版本说知道了疗养院秘密被"处理"了）
            - 2006: 男游客迷路2天后找回（被视为"收人未遂"）
            - 2018: 偷猎者声称看到火光
        - folk_name: "白岛三色光"——白衣（1994）、蓝衣（2006）、鬼火（2018）
        - fisherman_taboo: 渔民非必要不上岛，尤其农历七月
        - note: 三次事件无明确共同点，民间自行串联

    social_strata:
      top:
        - 新城白领
        - 开发区投资者
      middle:
        - 文创园艺术家（被顶层和底层两边看不上）
      bottom:
        - 老城原住民（中老年为主，年轻人搬走）
        - 码头工人（多数已转物流或退休，对文创园改造有"我们的过去当布景"的微妙怨恨）
      gray_zone:
        - 港区临时工（码头散工、快艇接驳人）
        - 警察不太管

    city_character: >
      "表面开放、内里封闭"——礼貌不交底，"不该问的别问"是社会默契。
      信息突破入口：茶摊、酒桌、渔友关系。

    intelligence_nodes:
      - name: 天后宫茶摊
        description: 每天早上老头们聚集，掌握全城信息（"茶桌情报网"）
        reliability: 高（民间信息核心节点）
      - name: 回声酒吧
        proprietor: 前记者
        description: 文创园核心据点，曹斌生前为合伙人兼歌手
      - name: 港口货运站调度室
        description: 码头信息集散地
      - name: 社区民警线人
        reliability: 低（只提供表层信息）

  # ============================================================
  # 刑侦技术能力体系（来源：力量体系师）
  # ============================================================
  power_system:
    overview: >
      本文的"力量体系"指刑侦技术能力格局——临港市局的鉴证能力存在明显的
      新旧城区技术差距，大量关键区域处于监控盲区。凶手的核心优势是对临港
      地下空间的熟悉度，掌握一条从未出现在官方地图上的"老路"。

    forensic_capability:
      dna:
        routine: 市局可做常规STR检测
        complex: 送省厅，需3-5天
      toxicology:
        routine: 市局可做常规毒物检测
        novel: 送省厅
      trace_evidence:
        basic: 市局可做基础对比
        advanced: 送省厅

    medical_examiner:
      lead: 老刘（25年经验，在编法医）
      assistant: 一名
      relationship: 和赵海涛关系好
      independence: 不受行政干预
      protege: 林筱（28岁，省厅培训归来）
      re_examination_procedure: 家属或上级要求，或出现新证据，需分局以上批准

    surveillance:
      new_town_and_main_roads: 高清数字摄像头（2018年后安装）
      old_town_lanes: 标清模拟摄像头，盲区大
      key_blind_spots:
        - 青石街巷区基本无监控（仅街口一个标清探头，盲区大）
        - 废弃码头无公安监控（仅文创园自装网络摄像头）
        - 北郊山洞群无监控
        - 白岛无监控
        - 山洞/码头老区大量盲区

    communication_and_data:
      call_records: 可调取6个月内通话记录和基站定位，需分局以上领导批准
      social_media: 需省厅网安协调配合，流程较慢
      mobile_signal: 老城区部分区域4G信号弱

    killer_advantages:
      - 对临港地下空间的熟悉度——知道一条从老城区某处通往北郊暗河系统的"老路"（当年勘探队留下的），从未出现在官方地图上
      - 可能掌握1994年案的内部信息

    evidence_status_1994_case:
      - 原始卷宗不完整
      - 现场照片底片"丢失"
      - 物证袋仅有衣物和拖鞋，DNA降解严重
      - 马国良称"记不清了"
      - 疗养院档案在铁路分局档案室，调取需正式手续

    information_network:
      core_nodes:
        - 天后宫茶摊（"茶桌情报网"）
        - 回声酒吧（前记者老板）
        - 港口货运站调度室
      limitations: 社区民警有线人但只提供表层信息，主角需赢得非正式关系才能拿到"地下情报"

  # ============================================================
  # 核心人物（来源：角色师）——不属于原定四类映射，但为设定核心组成部分
  # ============================================================
  characters:
    protagonist:
      name: 江成
      age: 36
      role: 临港市局刑侦支队副支队长
      background: 临港出生长大，警校毕业回临港干了14年刑警
      core_drive: >
        母亲苏榕1994年在白岛疗养院失踪。父亲说"跟人跑了"，江成不信，
        一直在暗中调查。12岁时偷去过白岛被送回来。考警校、回临港、
        进刑侦——这个案子是他从警的深层原因。
      secret_known_by: 只有周铭知道他的背景（苏榕是他母亲）
      weakness:
        - 过度投入——查到和白岛相关的事就停不下来，会突破正常程序
        - 执念造成判断盲区——容易相信"母亲是被害"的线索
      others_say: 陈远征评价："他太想破这个案子了。"
      political_stance: >
        不选边。赵海涛有知遇之恩但对白岛案的态度令江成无法信任；
        周铭知道他的背景是潜在盟友但根基尚浅。江成靠案件进展说话，
        深入调查后将被迫选择。

    partner:
      name: 林筱
      age: 28
      role: 技术科法医（老刘的徒弟）
      background: 省厅培训归来，刑侦+法医跨科室搭档
      personality: 冷静、观察力强，与江成的直觉型互补
      relationship_to_protagonist: 合作关系加朋友
      personal_connection: 父亲当年是白岛疗养院医生

    mother:
      name: 苏榕
      role: 白岛疗养院护士
      disappearance: 1994年某天夜班后失踪
      details:
        - 上白岛前与江成父亲关系已不好
        - 个人物品都在，班次记录正常
        - 院方结论："自行离岗→走失"
      last_words: 失踪前对同事说过"有些事知道了不好"
      witness: 阿珍婆（1994年在码头见过她等船——穿便服拎小包）

    power_triangle:
      - name: 赵海涛
        role: 副市长兼公安局局长 / 三级警监 / 本地派
        relation_to_jiang_cheng: 有知遇之恩
        stance: 白岛案"过去的事了，没必要翻"
      - name: 周铭
        role: 公安局副局长（分管刑侦）/ 二级警督 / 空降派
        relation_to_jiang_cheng: 知道江成背景的潜在盟友，但根基浅
        secret: 与省厅陈远征有暗线联系
      - name: 陈远征
        role: 省厅刑侦总队二处副处长（积案督导）/ 一级警督
        relation_to_jiang_cheng: 了解江成执念的前辈，1994年现场勘查者
        secret: 与周铭有绕过赵海涛的暗线

    antagonist:
      nature: 利益联盟（当年参与掩盖白岛失踪案的相关方）
      trigger: 曹斌案是这个联盟出现裂痕的结果
      current_case: 参见 current_case 字段

    current_case:
      victim: 曹斌
      age: 42
      identity: 回声酒吧合伙人兼歌手
      death_scene: 文创园B区废弃仓库钢架下
      suspicious_points:
        - 无攀爬痕迹
        - 死亡当晚与一个未注册号码通话47秒
        - 由匿名公用电话报警
      link_to_white_island:
        - 左手腕有旧疤痕——江成认出与母亲遗物笔记中描述的"白岛疗养院约束带疤痕"相似
      background: 经营酒吧前曾在私人调查公司工作

  # ============================================================
  # 历史时间线（跨Agent整合）
  # ============================================================
  history:
    timeline:
      - period: 清末
        event: 船工舍身救渔民，后被民间自发封为"山神"，供奉于天后宫偏殿
      - period: 解放前
        event: 北郊山洞群被当地居民用作"躲兵洞"
      - period: 1958
        event: 勘探队进入鬼喊洞扩挖，留下标记
      - period: 1970年代
        event: 白岛疗养院建成，为铁路系统职工疗养院
      - period: 1980年代
        event: 地质队报告显示老城区地下有古河道遗迹
      - period: 1990年代
        event: 疗养院改制后废弃（官方原因：淡水井旱季干涸）
      - period: 1994
        event: 苏榕（白岛疗养院护士）夜班后失踪；陈远征带队勘查现场，发现脚印只去不回、拖鞋整齐放岸边，随后被马国良和铁路系统施压停手
      - period: 1994后
        event: 陈远征被"上调"省厅；鬼喊洞支洞被人用水泥砂浆掺海沙封堵，无人承认
      - period: 2006
        event: 男游客在白岛迷路2天后被找回（民间视为"收人未遂"）
      - period: 2018
        event: 偷猎者在白岛声称看到火光；新城区/主干道高清数字监控系统安装
      - period: 近年
