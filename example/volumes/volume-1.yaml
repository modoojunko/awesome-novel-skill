# volume-1.yaml - 第一卷：裂缝

title: "裂缝"
volume: 1
summary: |
  凌晨六点四十七分。程序员林辰在末班地铁上目睹了一个不可见的存在吞噬了一名乘客。
  更可怕的是——没有人记得那名乘客存在过。
  他的调查将把他拖入一个隐藏在都市表面之下的世界，而那个东西已经注意到他了。

chapters_summary:
  - chapter: 1
    title: "末班地铁"
    summary: "加班到凌晨的林辰赶三号线末班地铁回家。六点四十七分，地铁进入隧道——他看到了不该看到的东西。一个半透明的暗色团块从空气中渗出，缓慢地包裹住对面座位上的中年男人。三分钟后，那个人消失了。没有人尖叫，没有人报警。其他乘客的目光像是穿过了那个空座位——不是无视，而是那个位置在他们认知中本来就是空的。"

  - chapter: 2
    title: "被抹去的人"
    summary: "林辰试图调查被吞噬的乘客。他记住了对方的脸——但没有任何社交平台能找到匹配项。他记得对方在中山路站下车——但调出监控，画面中那个位置始终是空的。更诡异的是，那个异物似乎开始出现在他的生活中——不是在凌晨，而是在他独处的时候。他在一个匿名论坛上发帖，收到了一条私信：'你也看到了，对吧？'

core_conflict: "看到真相的人 vs 抹去真相的力量"
character_arc: "林辰从被动目击者转变为主动调查者"
