# vol-1-ch-1.yaml - 第1章"委托人"

volume: 1
chapter: 1
title: "委托人"

outline:
  summary: "苏沫通过朋友介绍来到陆征的私家侦探所，委托他调查姐姐苏棠的失踪。陆征在初步询问中发现几个警方调查中被忽略的细节，决定接下这个案子。"
  key_points:
    - "陆征在办公室度过一个闷热的下午，整理旧案卷"
    - "苏沫来访，讲述姐姐苏棠失踪两周的经过——手机留在家、没有打斗痕迹、警方判定主动离开"
    - "陆征询问苏棠的工作、社交、最近的行踪变化，发现苏棠失踪前一周曾频繁晚归"
    - "苏沫提及警方调查中的一个矛盾：苏棠失踪当天曾在朋友圈发了一张照片，但警方说该地址查无此址"
    - "陆征决定接下案子，去苏棠出租屋勘查"
  characters: ["陆征", "苏沫"]
  location: "陆征的私人侦探所办公室（钟声桥附近旧写字楼四层）"
  time: "夏季，下午到傍晚"
  narrative_pov: "第三人称有限视角（陆征）"

memo:
  current_task: "建立陆征的人物形象和日常工作状态，通过苏沫的委托引入主线案件"

  reader_expectation:
    state: "空白——这是第一章，读者没有任何预设"
    strategy: "制造新缺口"
    detail: "制造一个核心悬念：苏棠到底去哪了？为什么警方和家属的判断完全相反？"

  payoff_plan:
    must_resolve: []
    must_hold: ["hook-002"]
    partial_advance:
      - id: "hook-001"
        advance: "种下主线钩子——苏棠失踪，警方判定主动离开，但细节有矛盾"

  downtime_functions:
    - "开头办公室场景 → 建立陆征的日常状态和性格底色"
    - "陆征观察苏沫的细节 → 展示陆征的职业习惯和观察力"

  key_choices:
    - "陆征为什么接下案子？——一半是需要收入维持事务所运转，一半是苏沫提到的朋友圈地址查无此址让他觉得警方确实草率了。符合他的人设：不急于下判断，相信细节。"

  required_changes:
    - "信息改变：陆征（和读者）知道了苏棠失踪的基本事实和几个疑点"
    - "关系改变：陆征和苏沫建立了委托关系"

  prohibitions:
    - "不要揭示陆征三年前离开警队的详细原因——只通过细节暗示他以前是刑警"
    - "不要让陆征一开始就表现出对案子的极大热情——他是专业的、克制的"
    - "不要写苏沫哭或崩溃——她是有备而来的"

emotional_design:
  primary_mood: "好奇"
  mood_progression: "日常松弛→好奇心被勾起→悬念收束（带着问题结束）"
  intensity_peak: "苏沫描述朋友圈地址查无此址的瞬间——这是陆征真正被勾起兴趣的时刻"
  satisfaction_beat: "陆征在苏沫的叙述中发现了警方忽略的细节——读者感到这个侦探确实有料"
  emotional_hook: "悬念（苏棠到底在哪？朋友圈地址为什么查无此址？）"
  intensity_level: 5

  micro_payoffs:
    - type: "info"
      description: "读者获得核心悬念的基本信息：苏棠失踪两周，手机留家，警方结论与家属判断矛盾"
      location: "中段"
    - type: "recognition"
      description: "陆征发现了警方忽略的细节——建立了对主角专业能力的信任"
      location: "后段"

segments:
  - seg_number: 1
    function: "atmosphere"
    goal: "建立陆征办公室的环境氛围和主角的日常状态"
    what_to_write: "陆征在这个闷热下午感受到的是时间的钝感——翻旧案卷是消磨，也是习惯。办公室的封闭与窗外钟楼的恒定构成一种停滞的氛围。电话响起时，他的反应不是期待，而是一种职业性的'知道了'。让读者通过他如何独自度过一个无事发生的下午来认识这个人——他的节奏、他的沉默、他对待信息的方式。"
    characters: ["陆征"]
    emotional_tone: "放松"
    word_target: 400
    ends_with: "陆征挂掉电话，把桌上的案卷合上。他看了看窗外——钟楼的指针指向三点。"
    dialogue_intent: ""
    micro_payoff: null
  - seg_number: 2
    function: "dialogue_push"
    goal: "苏沫讲述姐姐失踪经过，陆征初步获取案情信息"
    what_to_write: "苏沫的到访打破了沉闷。陆征注意到的不是她的长相或穿着，而是她的准备充分——冷静、有条理、不浪费一句话。她讲述的失踪经过在他心里激起的不是同情，而是专业上的不对劲：手机留在家、没有打斗痕迹，警方却判为主动离开。苏沫用信封和那句'还有一件事'完成了说服——不是靠情绪，而是靠信息。陆征开始真正在听。"
    characters: ["陆征", "苏沫"]
    emotional_tone: "好奇"
    word_target: 600
    ends_with: "苏沫从包里拿出一个牛皮纸信封，放到陆征桌上。'这是苏棠的朋友给我的一些东西。'她停顿了一下，'还有一件事，警方没当回事——但我总觉得不对。'"
    dialogue_intent: "说服——苏沫要说服陆征这个案子值得查，不是警方判定的那么简单"
    micro_payoff: "info"
  - seg_number: 3
    function: "character_beat"
    goal: "展示陆征的职业观察力和思维方式"
    what_to_write: "陆征没有追问那件'还有一件事'——他先用沉默让苏沫填满空间。在苏沫的叙述中，他同时捕捉到两个频率：苏棠生活的规律性在一个月前突然断裂（频繁晚归），以及苏沫手腕上那根被反复缠绕的橡皮筋。这两件事在他脑子里并置——姐姐的异常和妹妹的紧张。读者应该在这段建立起对陆征职业直觉的信任：他在听的不是苏沫说了什么，而是什么被省略了。"
    characters: ["陆征", "苏沫"]
    emotional_tone: "好奇"
    word_target: 450
    ends_with: "陆征放下笔，靠回椅背。他看着苏沫，等她主动说那件'没当回事'的事。"
    dialogue_intent: ""
    micro_payoff: null
  - seg_number: 4
    function: "revelation"
    goal: "揭露核心矛盾——朋友圈地址查无此址"
    what_to_write: "苏沫终于说出那件'还有一件事'。苏棠失踪当天在朋友圈发了一张随手拍——配文只有一个句号。照片里的地址在现实中不存在：那条街没有那个门牌号。陆征接过照片时，感受到的不是线索的激动，而是一种熟悉的警觉——在刑警生涯中，这种'不可能'往往意味着有人在掩盖什么。照片上的细节是读者需要感受的'不对劲'的载体：上午的阳光角度、卷帘门、红色塑料桶、不存在的53号。陆征合上笔记本的那一刻，决定已经不言自明。"
    characters: ["陆征", "苏沫"]
    emotional_tone: "紧张"
    word_target: 500
    ends_with: "陆征把照片夹进笔记本，合上本子。'这个案子我接了。'他说。"
    dialogue_intent: ""
    micro_payoff: "info"
  - seg_number: 5
    function: "character_beat"
    goal: "陆征独处时的思考——决定接案的内在逻辑"
    what_to_write: "苏沫离开后，陆征独处的安静与之前不同——不再是等待的安静，而是思考的安静。他把信封里的东西倒在桌上——日记本、旧手机、照片——这些物品的重量不在于它们的内容，而在于它们属于一个可能已经不在日常生活中的人。他在窗边看桥上的车流，接案的理由在脑中排列：一半是事务所的运转需要收入，另一半是那个不存在的门牌号像一根刺。他在笔记本上写下几个关键词并圈出'53号'——这个动作本身就是在告诉读者：他已经在心里把线索连成了线。"
    characters: ["陆征"]
    emotional_tone: "好奇"
    word_target: 450
    ends_with: "陆征拿起电话，拨了一个号码——是苏棠租房的中介。'明天上午能看房吗？'他说。"
    dialogue_intent: ""
    micro_payoff: null
  - seg_number: 6
    function: "emotional_landing"
    goal: "章末情绪落地——带着悬念结束，读者想点下一章"
    what_to_write: "陆征离开办公室，走向傍晚的城市。楼梯间的黑暗、桥上的尾灯、江面缓慢流动的水——这些不是风景，是他此刻心绪的外延。他在桥头买了一包不常抽的烟，这个非习惯性动作本身就是他还在运转的信号。脑子里反复回响的是那张照片里的53号——读者需要感受到一种安静的决心在形成，而不是焦虑或兴奋。钟楼的钟敲六下，声音在江面上散开。明天他会去那条街。"
    characters: ["陆征"]
    emotional_tone: "好奇"
    word_target: 450
    ends_with: "他把烟掐灭在栏杆上，弹进垃圾桶。钟楼的钟敲了六下——声音在江面上散开。"
    dialogue_intent: ""
    micro_payoff: "clue"

prompt_path: "./prompts/vol-1-ch-1-prompt.md"
