# vol-1-ch-3.yaml - 第3章"旧案"

volume: 1
chapter: 3
title: "旧案"

outline:
  summary: "陆征追查便利贴地址和聊天记录的线索，发现苏棠失踪前曾接触过一个物流公司的临时工——此人三年前在一起未破的抢劫杀人案中作为证人出现过。那起案子，正是陆征离开警队前办的最后一个案子。陆征去找方岩询问旧案卷宗，方岩的反应让他意识到这远不止一桩失踪案。"
  key_points:
    - "陆征根据便利贴地址找到一家物流公司，发现苏棠失踪前一周曾来这里找过人"
    - "陆征查到苏棠找的人是一个临时工——此人在三年前一起抢劫杀人案中做过证人"
    - "陆征去警局找方岩，借调三年前旧案的卷宗——方岩表情不对，反复问陆征为什么查这个"
    - "方岩私下告诉陆征：当年那个证人后来消失了，案子被压下来。让他小心"
    - "陆征回到办公室，发现门锁有被撬过的痕迹——有人在找什么东西"
  characters: ["陆征", "物流公司前台", "方岩"]
  location: "物流公司（南岸新区边缘）、警局、陆征办公室"
  time: "第三天全天"
  narrative_pov: "第三人称有限视角（陆征）"

memo:
  current_task: "将苏棠失踪案与三年前旧案建立联系，揭示案件远比失踪更复杂"

  reader_expectation:
    state: "紧张中带好奇——上章结尾被人盯上，读者担心陆征的安全，同时想知道苏棠的下落"
    strategy: "制造新缺口"
    detail: "读者在等调查进展和苏棠下落——给一部分进展（旧案联系），但同时告诉他们更大的麻烦在后面（办公室被撬）"

  payoff_plan:
    must_resolve: []
    must_hold: ["hook-002"]
    partial_advance:
      - id: "hook-001"
        advance: "发现苏棠的失踪与三年前旧案的证人有关联——案件升维，从失踪案变为可能涉及灭口的刑事案件"
      - id: "hook-002"
        advance: "通过方岩的对话隐约暗示陆征三年前离开警队的原因——与那个被压下来的案子有关"

  downtime_functions:
    - "陆征去物流公司路上的环境描写 → 南岸新区与老城区的对比，暗示城市的两面性"
    - "陆征和方岩的对话 → 展示两人关系的复杂层面——旧情分、愧疚、警惕"

  key_choices:
    - "陆征为什么不直接告诉方岩全部信息？——他不确定方岩在这个案子里扮演什么角色，三年前的事让他对任何警局的人都有保留。这是性格驱动的选择。"
    - "方岩为什么要私下警告陆征？——他对陆征有愧疚，但也不希望陆征捅出大篓子连累自己。矛盾的选择符合他的人设。"

  required_changes:
    - "信息改变：案件从失踪升维为可能涉及旧案证人的刑事案件"
    - "关系改变：陆征和方岩的旧关系被重新激活——微妙的张力"
    - "物理改变：陆征的办公室被侵入——他的安全空间不再安全"

  prohibitions:
    - "不要揭示三年前案件的全貌——只给出碎片信息"
    - "不要让方岩对陆征完全坦诚——两人的关系有裂痕，对话有保留"
    - "不要在章末揭示跟踪者的身份"

emotional_design:
  primary_mood: "紧张"
  mood_progression: "调查推进的专注→发现旧案关联的震惊→方岩警告后的压抑→办公室被侵入的不安"
  intensity_peak: "陆征发现办公室门锁被撬的瞬间"
  satisfaction_beat: "案件从普通失踪升维为可能涉及命案的刑事案件——读者感到格局被打开了"
  emotional_hook: "威胁+悬念（有人进过陆征的办公室，他知道自己正在接近什么）"
  intensity_level: 7

  micro_payoffs:
    - type: "info"
      description: "新信息：苏棠失踪与三年前旧案证人有关——案件格局大幅升级"
      location: "中段"
    - type: "relationship"
      description: "陆征和方岩的旧关系被重新激活，两人的互动充满张力"
      location: "中段后段"
    - type: "clue"
      description: "办公室被侵入——暗示调查正在接近敏感地带"
      location: "后段"

segments:
  - seg_number: 1
    function: "transition"
    goal: "陆征开车从老城区到南岸新区——城市氛围的对比"
    what_to_write: "陆征在车里多坐了一会儿才发动——不是在犹豫，是在消化昨天那个灰短袖在自己脑子里留下的尾迹。过钟声桥时，南北两岸的差异是城市性格的切面：老城区的旧柏油路变成南岸平整的沥青，街宽了一倍。到达工业园角落那栋三层小楼时，褪色的'盛通货运'招牌给他带来的不是期待，而是一种直觉性的预感：便利贴上的地址不是目的地，是一个入口。"
    characters: ["陆征"]
    emotional_tone: "专注"
    word_target: 400
    ends_with: "陆征把车停好，拎着帆布袋走向小楼。一个穿蓝色工作服的女人在前台打电话，看到他进来，用手捂住听筒。"
    dialogue_intent: ""
    micro_payoff: null
  - seg_number: 2
    function: "action_beat"
    goal: "在物流公司调查，查到苏棠来找的人的信息"
    what_to_write: "陆征在物流公司前台调查时，程序性的问询底下是克制住的紧迫感。访客登记表上的两个名字——苏棠和只写了一个'周'字的访客——先后找过同一个临时工'老马'，这本身就是一个需要被注意到的模式。前台的犹豫（翻抽屉找联系方式时的停顿）不应该被读作阻挠，而应该被读作她也在不确定中。陆征存下老马的号码时，他的注意力卡在那个'周'字上——没有日期、没有全名，比苏棠的签名更像是被人有意模糊的痕迹。"
    characters: ["陆征", "物流公司前台"]
    emotional_tone: "专注"
    word_target: 500
    ends_with: "陆征拿出手机，把老马的号码存进去。他的目光停在那行'周'字上——没有日期，没有全名，像是随手划的。"
    dialogue_intent: ""
    micro_payoff: "info"
  - seg_number: 3
    function: "revelation"
    goal: "发现线索指向三年前旧案——案件格局升级"
    what_to_write: "陆征在车里打开旧数据库查询时，指尖的动作是熟悉的——这是他曾经每天的日常。当三年前抢劫杀人案的记录跳出来，办案人一栏出现自己的名字时，他感受到的不是震惊，而是一种终于咬合上的沉重感——一切都开始收紧。老马是三年前那起未破命案的证人，然后消失；苏棠来找过老马，然后消失。办案人里方岩排第一、陆征排第二——这是他离开警队前办的最后一个案子。过去不是在提醒他，是在咬住现在。"
    characters: ["陆征"]
    emotional_tone: "紧张"
    word_target: 500
    ends_with: "陆征合上电脑，手背上的青筋跳了一下。那个姓马的证人——三年前的抢劫杀人案中作证的临时搬货工——一周前突然不来了。来找他的人两周前失踪了。他发动了车，不是回家——是去警局。"
    dialogue_intent: ""
    micro_payoff: "info"
  - seg_number: 4
    function: "dialogue_push"
    goal: "陆征和方岩的对手戏——借调卷宗、试探、旧关系的张力"
    what_to_write: "刑警队办公室熟悉得令人不适——过期值班表还在墙上，一切都不曾改变，除了方岩看到陆征时的眼神。方岩的反应不是惊喜，是戒备——这让陆征确认了一件事：这个案子碰到的是活的神经。两人的对话被沉默切割——方岩在选词，陆征在读选词背后的信息，两个人都没有说出自己真正在想的东西。方岩告诉他马国良作证后消失、案子被压下来时——语速比平时慢——陆征感受到的不是愤怒，而是一种被验证的预感。'别查了'和随后说出的'晚上别一个人走'之间的空白，才是方岩真正想说的话。"
    characters: ["陆征", "方岩"]
    emotional_tone: "压抑"
    word_target: 600
    ends_with: "陆征站起来。方岩没有送他。走到门口时，方岩说了一句：'你办公室那条街，晚上别一个人走。'陆征没回头。"
    dialogue_intent: "试探/转移/暗示——方岩用警告的方式同时表达了关心和恐惧"
    micro_payoff: "relationship"
  - seg_number: 5
    function: "character_beat"
    goal: "陆征独自消化方岩的警告——内心冲突和决心"
    what_to_write: "陆征坐进车里没有发动。方岩的话在脑中回放——'案子被压下来'、'别查了'、'晚上别一个人走'——三年前他选择相信方岩说的'上面决定的'，现在那个信任在松动。马国良消失的时间节点和苏棠失踪的关联，让他感受到的不是线索的兴奋，而是一种被过往追赶的重量。他发动车时手比平时更稳——这不是沉着，是他在真正紧张时的反向体征。警局大楼在后视镜里缩小，但过去没有缩小——它在车里，在他旁边。"
    characters: ["陆征"]
    emotional_tone: "压抑"
    word_target: 350
    ends_with: "他在后视镜里看了一眼警局大楼——那栋楼他进出过十年。然后他打转向灯，融入车流。"
    dialogue_intent: ""
    micro_payoff: null
  - seg_number: 6
    function: "emotional_landing"
    goal: "回到办公室发现被侵入——威胁升级，章末钩子"
    what_to_write: "陆征回到办公室时，门锁上的划痕是最先进入他视线的东西——新鲜的、被工具插入过的痕迹。办公室看起来一切正常，但他知道自己不在时有人来过：椅子偏移了十五公分，文件顺序被翻动过，窗台上有一片不是灰尘的烟灰。这种被侵入的冷感——每天待的安全空间不再安全——应该通过陆征缓慢扫视房间时的沉默来传达，而不是通过对细节的戏剧化渲染。拉开抽屉拿出那把空枪时，他意识到两件事：枪没有子弹，方岩的警告可能是真的。这两者的并置告诉他：他在一个人面对一个还在呼吸的旧案。"
    characters: ["陆征"]
    emotional_tone: "不安"
    word_target: 500
    ends_with: "陆征从抽屉里拿出那把旧配枪——退役时没交回去，一直锁在抽屉最底层。他拉开弹匣——空的。他一直没买子弹。他把空枪放回抽屉，关上。窗外的钟楼敲了四下——他想起了方岩的话。有人在提醒他——或者说，在警告他。但马国良不见了，苏棠也不见了。他不能不查。"
    dialogue_intent: ""
    micro_payoff: "clue"

