# vol-1-ch-4.yaml - 第4章"暗线"

volume: 1
chapter: 4
title: "暗线"

outline:
  summary: "陆征不再被动等待——办公室被侵入让他决定主动反击。他通过前同事追踪老马的手机信号，在城北城中村走访中拼凑出老马的生活轨迹：赌债缠身、失踪前曾说'要发一笔'。灰短袖再次出现，这次陆征选择正面应对——一场暗流涌动的对峙中，对方无意间透露了一个关键信息：老马不只是证人。陆征反向追查灰短袖的车牌，发现一家注册在开发区的安保公司。碎片开始拼成一张他不愿看到的图。"
  key_points:
    - "陆征一早就联系刑侦队老技术员老邱，请他帮忙查老马的号码——定位到最后活跃基站在城北城中村。老邱犹豫后透露：三年前老马的证词档案被人调走过"
    - "陆征在城北城中村走访——棋牌室老板和邻居拼出老马的画像：赌债缠身，失踪前对人说'要发一笔'。有人见过他和一个年轻女人在巷口说话"
    - "陆征从城中村出来发现灰短袖在跟——这次他主动拐进死胡同，正面交锋。灰短袖受过训练、话极少。对峙中透露：老马不只是证人"
    - "陆征记下灰短袖的车牌，通过老邱反查——车辆挂在一家注册在开发区的安保公司名下。公司法人信息被加密"
    - "陆征回办公室整理一天的碎片——老马'要发一笔'、证词档案被调走、安保公司、灰短袖的警告。图景开始浮现：三年前的案子不是悬而未破，是有人让它悬着。苏棠来找老马，触发了同一套机制"
  characters: ["陆征", "老邱", "棋牌室老板", "灰短袖男人"]
  location: "刑侦队技术科（短暂）、城北城中村、死胡同巷道、陆征的车/办公室"
  time: "第四天全天"
  narrative_pov: "第三人称有限视角（陆征）"

memo:
  current_task: "陆征主动出击——不再被动接受威胁，利用自己的前警队人脉和技术手段反向追查老马和跟踪者的线索"

  reader_expectation:
    state: "不安中带期待——上章结尾办公室被侵入，读者担心陆征的安全，同时也期待他做出反击"
    strategy: "制造新缺口"
    detail: "读者想看陆征反击——给他反击（主动追查、正面应对灰短袖），但同时也告诉他：敌人比他想象的更有组织。旧的悬念（苏棠在哪）叠加新的悬念（这背后是谁）"

  payoff_plan:
    must_resolve: []
    must_hold: ["hook-002"]
    partial_advance:
      - id: "hook-001"
        advance: "通过城中村走访确认苏棠确实来找过老马——进一步证实两人失踪的关联。老马'要发一笔'暗示他可能掌握了某种可以换钱的信息"
      - id: "hook-003"
        advance: "灰短袖再次出现，陆征正面交锋——从被动被跟踪到主动对峙。灰短袖的身份指向安保公司"
      - id: "hook-005"
        advance: "暂不推进'周'字线索——留到后续章节"

  downtime_functions:
    - "陆征开车去城中村的路上 → 北岸老城区的纵深——不是钟声桥附近那种熟悉的旧，是更边缘、更破败的城市褶皱"
    - "陆征和老邱的通话 → 展示前警队人脉——不是所有老同事都像方岩那样复杂，有些人只是普通人，帮个小忙不需要理由"

  key_choices:
    - "陆征为什么选择正面应对灰短袖而不是继续躲？——办公室被侵入改变了他的策略。之前他以为自己在暗处调查，现在他知道自己在明处。与其等人找上门，不如主动试探对方的底线"
    - "灰短袖为什么在对话中说漏'老马不只是证人'？——不是训练不足，是陆征的提问方式让他需要展示自己知道更多。权力展示中容易露出信息"

  required_changes:
    - "信息改变：陆征知道老马'不只是证人'、证词档案被调走过、灰短袖背后是一家安保公司——碎片开始拼出指向警局内部或关联势力的图景"
    - "关系改变：陆征和灰短袖从单向跟踪变为双向了解——陆征拿到了对方的车牌信息"
    - "物理改变：陆征确认城北城中村是老马和苏棠最后出现的地点之一"

  prohibitions:
    - "不要揭示苏棠的下落——她仍然是失踪状态"
    - "不要揭示三年前案件全貌——只给碎片"
    - "不要写成动作戏——正面交锋是站着的对话，不是打斗"
    - "不要让灰短袖变成漫画式反派——他是专业的、冷静的，话少但有分量"
    - "不要让方岩出场——这章聚焦陆征的独立行动"

emotional_design:
  primary_mood: "紧张"
  mood_progression: "冷静的决意→耐心走访→对峙中的紧绷→拼图后的沉重"
  intensity_peak: "陆征和灰短袖在死胡同里对峙的最后一句话——'老马不只是证人。你应该知道这话是什么意思。'"
  satisfaction_beat: "陆征通过老邱查到灰短袖的车牌——读者感到他手里终于有了反击的工具"
  emotional_hook: "威胁升级+真相轮廓（三年前的案子是被人为悬置的。苏棠碰了不该碰的东西。陆征知道了太多——但还不够多）"
  intensity_level: 7

  micro_payoffs:
