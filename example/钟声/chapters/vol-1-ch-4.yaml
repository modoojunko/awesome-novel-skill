      location: "中段至后段"
    - type: "power"
      description: "陆征主动出击——正面应对灰短袖、反向追查车牌，从被动防御转为主动博弈"
      location: "中段"

segments:
  - seg_number: 1
    function: "character_beat"
    goal: "陆征在清晨决定主动出击——从被动防御转为主动追查"
    what_to_write: "陆征在办公室过夜后（或很早醒来），做出决定：不再等下一个威胁找上门。他给老邱打电话——老邱是刑侦队的技术员，快退休了，是全队唯一不站队的人。电话里陆征请他查老马的手机号最后活跃位置。老邱犹豫了一下——不是不想帮，是知道陆征已经不在队里了。但最后还是查了：老马的号码三个月前停用，最后活跃基站在城北城中村附近。挂电话前老邱低声说：当年老马的证词档案被人调走过，调档记录没留名字。"
    characters: ["陆征", "老邱（电话）"]
    emotional_tone: "冷静的决意"
    word_target: 450
    ends_with: "陆征挂断电话，把那行地址抄在纸上。老邱最后那句话他没有追问——有些事不需要追问，知道就够了。"
    dialogue_intent: ""
    micro_payoff: null
  - seg_number: 2
    function: "atmosphere"
    goal: "城北城中村的氛围建立——更边缘的城市褶皱"
    what_to_write: "陆征开车穿过北岸老城区的纵深——过了铁道桥洞再往北，街景从筒子楼变成自建房，电线杆上贴满了出租广告。城中村在城北的边缘，是那种在城市地图上被标注为'待改造片区'的地方。巷子很窄，两边是三层加盖的砖房，晾衣绳横跨巷子上空，滴水的衣物被上午的太阳蒸出水汽。陆征找到老马租过的那栋房子——一楼改成了棋牌室，楼上隔了三间出租。这地方不是藏身处——是没钱的人住的地方。老马三年前作证后消失，最后落脚在这样一个地方，本身就是一个值得注意的信息。"
    characters: ["陆征"]
    emotional_tone: "专注"
    word_target: 400
    ends_with: "陆征把帆布袋往肩上拢了拢，推开棋牌室的玻璃门。麻将声和人声涌出来，混着烟味和泡面味。一个穿红背心的男人坐在吧台后面看手机，头也没抬。"
    dialogue_intent: ""
    micro_payoff: null
  - seg_number: 3
    function: "action_beat"
    goal: "在城中村走访中拼凑老马的生活轨迹"
    what_to_write: "棋牌室老板对老马的回忆带着一种市井的精确——不是关心，是每天看人进出养成的那种敏锐。老马的照片让他认出来了：那个'赢一把就跑'的搬货工，欠了牌桌上三个人的钱，最后一次来的时候一口气还清了，说'要发一笔'。陆征追问细节时，老板从吧台下摸出一个旧笔记本，翻到一页给他看——上面歪歪扭扭记着老马还钱的日期。邻居老太太在旁边插嘴：老马失踪前几天，巷口有人看到他和一个年轻女人说话——长头发、戴眼镜、穿白衬衫。陆征知道那是苏棠。时间和地点都吻合。"
    characters: ["陆征", "棋牌室老板", "邻居老太太"]
    emotional_tone: "专注"
    word_target: 550
    ends_with: "陆征把照片收回口袋里。'那个女人——'他问，'他们说话的时候，老马是什么表情？'老太太想了想：'挺高兴的。老马平时不怎么笑的，那天在笑。'"
    dialogue_intent: "对话是微型动作——陆征的问题精准、不废话，老板的回答是市井式的直接，老太太的插嘴带着老年人对陌生人天然的倾诉欲"
    micro_payoff: "info"
  - seg_number: 4
    function: "action_beat"
    goal: "灰短袖再次出现——陆征正面应对"
    what_to_write: "陆征从城中村出来，走了两条巷子后察觉被跟——同样的灰短袖，同样的距离感。但这次不同：陆征拐进一条死胡同，转过身靠在墙上等他。灰短袖走进胡同时看到陆征在等他，没有惊讶——这让陆征确认了对方是专业的。接下来的对话不是信息交换，是彼此试探边界：灰短袖每句话都在展示自己有能力，陆征每句话都在测试对方的底线。对话中灰短袖说'你不该查三年前的事'——重点不在于'不该查'，而在于他确认了三年前的事还在呼吸。接着他补了一句'老马不只是证人。你应该知道这话是什么意思'——说完后退了一步，意识到自己说多了。"
    characters: ["陆征", "灰短袖男人"]
    emotional_tone: "紧绷"
    word_target: 600
    ends_with: "灰短袖退到巷口。'够了。'他说。然后转身，没有跑——只是走得很快，拐过街角不见了。陆征站在原地，把那句话在脑子里过了两遍。老马不只是证人。"
    dialogue_intent: "灰短袖的意图是警告/压制——但他的职业习惯（展示信息量来建立权威）导致他说多了。陆征的意图是试探——通过让对方说话来收集信息"
    micro_payoff: "power"
  - seg_number: 5
    function: "revelation"
    goal: "陆征反向追查灰短袖——发现安保公司"
    what_to_write: "陆征没有去追灰短袖——追不是他的长项。他回到车里，把刚才交锋的画面在脑中重播，从灰短袖最后那句'老马不只是证人'反推回去，得到一个假设：老马的证词分量比卷宗里写的更重。他把灰短袖的车牌发给老邱——五分钟后老邱回电话说那辆车挂在开发区一家叫'恒安'的安保公司名下。但法人信息和股东名单在工商系统里被加密了——需要更高权限才能看到。老邱在电话里沉默了几秒，然后说'陆征，这种公司你比我清楚是干什么的'——话没说透，意思已经在了。"
    characters: ["陆征", "老邱（电话）"]
    emotional_tone: "紧张"
    word_target: 450
    ends_with: "陆征放下手机，望着车窗外那片低矮的自建房。下午的阳光把巷子压缩成光和暗的条纹。'恒安安保'——他在笔记本上写下这个名字，在旁边画了一个问号。"
    dialogue_intent: ""
    micro_payoff: "info"
  - seg_number: 6
    function: "emotional_landing"
    goal: "章末拼图——碎片开始浮现一个他不愿看到的轮廓"
    what_to_write: "傍晚时分陆征回到办公室——锁修过了，椅子的位置调回了正中。他坐在桌前摊开笔记本，把今天的碎片逐个归位：老马失踪前说'要发一笔'——他掌握的信息值钱。证词档案被人调走过——有人在系统内部清理痕迹。苏棠来找老马，老马在笑——苏棠问到了她想要的东西。灰短袖背后是安保公司——这种公司的注册模式不是普通保安。马国良的证词分量比卷宗里写的大得多——这点灰短袖亲口确认了。所有这些碎片拼出来的不是一条线，是一片阴影。陆征靠在椅背上，窗外的钟楼敲了六下，他想起了方岩说的'晚上别一个人走'。他从抽屉里拿出那把空枪，这次没有放回去——放在桌上，枪口朝向窗户。"
    characters: ["陆征"]
    emotional_tone: "沉重"
    word_target: 500
    ends_with: "他把空枪放在桌上——枪口朝向窗户，朝向那座钟楼。钟声停了，江面的余波还在扩散。他拿起手机翻到方岩的号码，没有拨出去——放在屏幕上，拇指停在半空。有些事情一旦开了头，就没有停下来的选项。"
    dialogue_intent: ""
    micro_payoff: "clue"

