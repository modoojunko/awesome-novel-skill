# vol-1-ch-2.yaml - 第2章"出租屋"

volume: 1
chapter: 2
title: "出租屋"

outline:
  summary: "陆征来到苏棠的出租屋进行现场勘查。房间的状态与警方'主动离开'的结论存在矛盾——物品的摆放暗示她不是计划好要走的。走访邻居获得的信息也互相冲突，而在苏棠的电脑里，陆征发现了一条被匆忙删除的聊天记录。"
  key_points:
    - "陆征进入苏棠的出租屋，观察房间状态——床没铺、充电器还插在墙上、冰箱里有吃了一半的外卖"
    - "陆征注意到苏棠房间里的异常细节：一张写着地址的便利贴被压在键盘下"
    - "走访隔壁邻居——一个老太太说苏棠那天出门时看起来很正常，但另一个邻居说听到过争吵"
    - "陆征在苏棠的电脑回收站里找到一条被删除的聊天记录——对方说'别去那个地方'"
    - "陆征离开时在楼下遇到一个抽烟的男人，男人盯着他看"
  characters: ["陆征", "邻居老太太", "楼下的男人（未命名）"]
  location: "老城区苏棠的出租屋及附近"
  time: "第二天上午到中午"
  narrative_pov: "第三人称有限视角（陆征）"

memo:
  current_task: "通过现场勘查推进案件调查，线索逐渐指向苏棠不是主动离开的"

  reader_expectation:
    state: "好奇——上一章结尾留下悬念，读者想知道苏棠到底去哪了"
    strategy: "制造新缺口"
    detail: "读者期待调查有进展——给他们一些进展（房间矛盾细节、被删聊天记录），同时制造新的疑问（楼下的男人是谁？）"

  payoff_plan:
    must_resolve: []
    must_hold: ["hook-002"]
    partial_advance:
      - id: "hook-001"
        advance: "勘查发现苏棠不是主动离开的证据；发现便利贴和被删聊天记录——指向有人知道更多"

  downtime_functions:
    - "陆征勘查房间的过程 → 展示他的专业刑侦习惯（观察细节、重建场景）"
    - "与邻居的对话 → 提供矛盾信息，增加案件复杂度"

  key_choices:
    - "陆征为什么注意到那张便利贴？——因为便利贴上的地址跟苏沫说的朋友圈地址是同一个区域。专业习惯让他把看似无关的线索连起来。"

  required_changes:
    - "信息改变：读者和陆征知道苏棠不是主动离开的——房间状态不符合计划出行的特征"
    - "信息改变：收到警告'别去那个地方'——暗示苏棠知道自己有危险"
    - "威胁引入：楼下的男人盯着陆征——调查被人盯上了"

  prohibitions:
    - "不要让陆征直接找到苏棠的下落——他只找到矛盾的线索"
    - "不要让楼下的男人和陆征对话——只通过眼神和氛围制造压力"
    - "不要揭示聊天记录的发件人身份"

emotional_design:
  primary_mood: "紧张"
  mood_progression: "好奇→发现矛盾后的紧张→被人盯着离开时的不安"
  intensity_peak: "陆征在楼下被陌生男人盯着的瞬间——安静的威胁"
  satisfaction_beat: "陆征发现房间矛盾细节和聊天记录——读者感到调查在实质推进"
  emotional_hook: "威胁（有人在盯着陆征——调查触动了什么）"
  intensity_level: 6

  micro_payoffs:
    - type: "clue"
      description: "获得两条新线索：便利贴上的地址、被删的警告聊天记录"
      location: "中段"
    - type: "info"
      description: "确认苏棠不是主动离开——矛盾细节确凿"
      location: "中段后段"

segments:
  - seg_number: 1
    function: "atmosphere"
    goal: "第二天早晨老城区氛围，陆征到达苏棠出租屋"
    what_to_write: "第二天早晨，老城区还没完全醒来。陆征拎着帆布袋走向苏棠的出租屋——他的动作节奏和昨天在办公室不同，是进入调查状态后的专注。旧楼道里的潮湿气味、走廊窗外能看到的钟声桥一角——这些不是氛围渲染，而是'这个案子开始了'的信号。中介到来时提到警方已经来看过一次——这句话在陆征心里激起的不是压力，而是一个很轻的判断：警方看过，但他要自己看。"
    characters: ["陆征"]
    emotional_tone: "放松"
    word_target: 400
    ends_with: "中介来了——一个年轻女孩，手里拎着一大串钥匙。'苏小姐的房东说您先看，'她说，'不过警方的人已经看过一次了。'"
    dialogue_intent: ""
    micro_payoff: null
  - seg_number: 2
    function: "action_beat"
    goal: "陆征勘查房间，发现与警方结论矛盾的细节"
    what_to_write: "陆征进入苏棠房间后的第一个反应是停下——在门口站半分钟，不动，先整体看。这不是犹豫，是职业本能。房间里的矛盾是无声的，需要读者和他一起感受：床没铺、充电器还插在墙上、冰箱里吃了一半的外卖——这些都不是一个计划出行的人会留下的状态。便利贴被压在键盘下，上面写着一个地址。陆征抽出它时的感受不是兴奋，而是一种冷静的警觉：什么东西需要压在键盘下面才能被注意到？"
    characters: ["陆征"]
    emotional_tone: "专注"
    word_target: 500
    ends_with: "陆征把便利贴翻过来。背面还有一行字，用不同的笔写的：'周三下午三点'。他把便利贴放进帆布袋的夹层里。"
    dialogue_intent: ""
    micro_payoff: "clue"
  - seg_number: 3
    function: "character_beat"
    goal: "陆征在房间里整理思路，建立场景感"
    what_to_write: "陆征从窗口俯瞰巷子——他在试图重建苏棠的日常视角。衣柜里大部分衣服还在、梳妆台上瓶罐整齐排列——这些碎片拼出的形象是：一个普通女人的生活被突然中断，而不是被从容打包。床头柜抽屉被翻过的凌乱与房间其他部分的整洁构成一道心理裂痕。他用小数码相机而不是手机拍照——这个习惯比任何说明都能告诉读者他来自哪里。走廊里中介的声音打断了他的思路，带来一个微妙的警觉信号：隔壁邻居主动想说话。"
    characters: ["陆征"]
    emotional_tone: "专注"
    word_target: 350
    ends_with: "他把相机收进口袋。走廊里传来中介女孩的声音：'先生？隔壁的王婆婆说想跟您说句话。'"
    dialogue_intent: ""
    micro_payoff: null
  - seg_number: 4
    function: "dialogue_push"
    goal: "走访邻居获得矛盾信息"
    what_to_write: "王婆婆说苏棠那天下午正常出门——蓝色连衣裙、小挎包、打招呼说去买东西。但三楼住户的说法完全相反：那天晚上听到了争吵。陆征在这两个版本之间感受到的不是'线索出现了'的兴奋，而是'信息彼此矛盾'的职业警觉——他知道在这种案子里，每个证人的叙述都会变形。两个说法之间的六个小时是这一段的张力核心：下午出门很轻松的女孩，晚上为什么在争吵？陆征需要在这段让读者感受到他开始把碎片拼成一条可疑的时间线。"
    characters: ["陆征", "王婆婆", "中介女孩", "三楼住户"]
    emotional_tone: "好奇"
    word_target: 550
    ends_with: "陆征收起笔记本。王婆婆说苏棠那天出门很轻松——三楼夫妇说听到她晚上在吵架。两个版本之间隔了至少六个小时，这六个小时里发生了什么？"
    dialogue_intent: "试探——陆征不完全相信任何一个邻居的说法，他在找矛盾点"
    micro_payoff: "info"
  - seg_number: 5
    function: "revelation"
    goal: "在电脑中发现关键证据——被删除的聊天记录"
    what_to_write: "陆征打开苏棠的电脑时感受到的是一种安静的不对劲——桌面太干净了，浏览器历史被清空，但回收站里躺着一个名叫'不要删'的文件。这种故意抹除和刻意保留并存的状态本身就值得警觉。还原后的聊天记录揭示了一条警告：'别去那个地方。等我回来再说。'陆征盯着这行字时的感受不是破案的兴奋，而是一种沉下去的冷感——苏棠在知道有危险的情况下，还是去了。文件被删掉却又命名为'不要删'——这个矛盾本身就是苏棠留给后来者的信息。"
    characters: ["陆征"]
    emotional_tone: "紧张"
    word_target: 500
    ends_with: "陆征盯着屏幕上那行字——'别去那个地方'。他把文件拷进自己的U盘，然后合上电脑。便利贴上的地址在键盘下压了多久？苏棠最后去了哪里？"
    dialogue_intent: ""
    micro_payoff: "clue"
  - seg_number: 6
    function: "emotional_landing"
    goal: "离开时被人盯上——引入外部威胁，制造紧张感"
    what_to_write: "陆征走出楼门时被一个灰短袖男人盯着——三秒钟的对视，没有一句话，但信息已经完成了交换。这种被注视的感觉比任何语言威胁都更有效，因为它意味着调查已经被注意到了。从巷口到车边的几十步里，他的后颈一直绷着——不是恐惧，是来自职业本能的警觉切换。假动作（系鞋带）和数步子这些行为不需要详写，但它们传递的信号应该是冷静的、评估性的，而非惊慌的。坐进车里从后视镜看到那人在拍照时，威胁从'被注意'升级为'被记录'——这是章末需要落在读者心里的寒意。"
    characters: ["陆征", "灰短袖男人"]
    emotional_tone: "紧张"
    word_target: 500
    ends_with: "陆征发动了车。他的手指在方向盘上敲了两下——这是他紧张时的习惯。后视镜里，那个灰短袖站到了巷口，一只手举着手机，像是在拍照。"
    dialogue_intent: ""
    micro_payoff: "clue"

