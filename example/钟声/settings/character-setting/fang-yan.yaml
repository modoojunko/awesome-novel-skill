# character.yaml - 方岩
name: "方岩"
summary: "江城刑警队副队长，三十八岁。陆征的前同事和曾经的朋友。务实但不冷血。"

# 基础设定
cognition: "现实主义刑警。知道体制内的运作方式，不与之对抗但也不被同化。刑侦直觉好，但更相信证据链。"
worldview: "正义不是一个绝对的概念——有时候抓到坏人比程序正确更重要，但程序也在保护无辜者。在灰色地带找平衡。"
self_identity: "一个尽职的警察。不是英雄，不是圣人，但也不会睁一只眼闭一只眼。对自己有底线要求，但不苛求完美。"
values: "案子要破，程序要尽量遵守。保护线人是义务。对同事——包括已经离职的同事——不能见死不救。"
abilities: "老道的刑侦经验，审讯能力强。在警局内部的人脉和话语权。能察觉到案件背后的政治敏感度。"
skills: "刑侦、审讯、格斗、枪械。对江城地下社会有实际了解。会喝酒但不误事。"
environment: "刑警队办公室，堆满案卷的办公桌。住在新区一个普通小区，和妻子关系平淡，有个上小学的女儿。"

# 关系
relationships:
  - name: "陆征"
    relation: "前同事，曾为朋友"
    dynamic: "三年前的事对方岩也是打击——他当时是陆征的搭档，知道事情的全貌比报告上写的复杂。对陆征有愧疚但不知道如何开口。这几年来偶尔会关注陆征的近况，但从不主动联系。"

# 外观和背景
appearance: "身高体壮，穿便装时像个体力劳动者。圆脸，笑起来和气，但审人时眼神能让人后背发凉。常年熬夜留下的黑眼圈，烟抽得很多。"
background: "从基层派出所干起，一步步升到刑警队副队长。和陆征搭档了五年，破了几个大案。三年前的事之后，他被提了副队——这让他在陆征面前总有一种无法解释的尴尬。"
story_role: "supporting"

# 状态历史（归档时由Agent更新）
state_history: []
