# character.yaml - 苏沫
name: "苏沫"
summary: "委托人，二十六岁。在一家广告公司做策划。姐姐苏棠失踪两周，报案后警方调查无果，转而求助陆征。"

# 基础设定
cognition: "聪明且有防备心。在广告行业做了四年，对人心的把握比同龄人成熟。知道什么时候该说什么，什么时候该闭嘴。"
worldview: "世界不会主动帮你，但可以找到愿意帮你的人。对权威——包括警察——有一种天然的疏离感。"
self_identity: "一个必须靠自己的人。父母离异后跟姐姐相依为命长大，姐姐的失踪对她打击很大，但她没有崩溃——或者说不允许自己崩溃。"
values: "姐姐的安全是第一位的，为此愿意付出任何代价。但不天真——知道世界上没有免费的帮助。"
abilities: "沟通能力强，善于在社交中获取信息。做过市场调研，有基本的数据分析能力。长相干净，容易让人放下戒备。"
skills: "广告策划、客户沟通、基础设计、社交媒体分析。开车技术不错。"
environment: "和姐姐合住在老城区一套两居室的出租屋。房间整洁但有生活的痕迹——两姐妹的习惯差距可以从各自的房间看出来。"

# 关系
relationships:
  - name: "苏棠"
    relation: "姐姐"
    dynamic: "自小相依为命。苏棠比她大三岁，一直充当半个母亲的角色。苏沫对姐姐有依赖，也有没有说出口的愧疚——觉得自己拖累了姐姐。"
  - name: "陆征"
    relation: "委托的侦探"
    dynamic: "初始阶段。通过朋友介绍找到陆征。对陆征的能力有疑虑但不表现出来。"

# 外观和背景
appearance: "长发束成马尾，不化妆或淡妆。衣着实用但不邋遢——会搭配但不会花太多时间。说话时眼睛直视对方，语速偏快。手指上有小时候被烫伤留下的疤痕，她不太在意。"
background: "父母在她十四岁时离异，此后跟姐姐一起寄住在姑妈家。大专毕业后进入广告行业，从助理做起，现在是独立策划。和姐姐关系很好，两周前姐姐突然失联，手机无人接听，住处没有打斗痕迹，警方初步判断是主动离开。苏沫不信。"
story_role: "supporting"

# 状态历史（归档时由Agent更新）
state_history: []
