# character.yaml - 陆征
name: "陆征"
summary: "退役刑警转私家侦探，三十三岁。沉默寡言但观察力极强，做事有自己的一套原则。"

# 基础设定
cognition: "理性务实主义者。相信证据和逻辑，但不排斥直觉。对人的判断很准——这是他做了十年刑警练出来的。知道自己不是英雄，也不试图成为英雄。"
worldview: "世界不是非黑即白，但有些线不能跨。每个人都在自己的处境里做选择，但选择有代价。"
self_identity: "一个想做好事情但过去犯了错的人。不是因为正义感做这行——是因为只会做这个。对'侦探'这个头衔没什么浪漫想象。"
values: "真相值得被看见，但不一定值得被公开。保护无辜者优先于惩罚罪人。做事可以走灰色地带，但不能越过底线。"
abilities: "出色的观察力和推理能力。能从一个人的行为细节判断其状态。擅长在复杂信息中找出矛盾点。"
skills: "刑侦经验、现场勘查、行为分析、基础格斗、驾驶。会抽烟但不酗酒——这和刻板印象不一样。对江城的老城区路线烂熟于心。"
environment: "租住在老城区一栋旧楼的顶层。办公室在钟声桥附近一栋九十年代写字楼的四层，电梯经常坏。办公室堆满档案盒，窗口能看到钟楼的尖顶。"

# 关系
relationships:
  - name: "方岩"
    relation: "前同事，现任刑警队副队长"
    dynamic: "有未解决的旧事。彼此尊重但回避。方岩觉得陆征三年前的事不全是他的错，陆征不这么认为。"
  - name: "苏沫"
    relation: "委托人"
    dynamic: "初始阶段。陆征看得出她有隐瞒，但不急于戳破。"

# 外观和背景
appearance: "中等身高，不壮但结实的体型。黑色短发，不太打理。穿深色夹克和旧皮鞋。眼睛很利——看人看物都有一种不疾不徐的审视。左手虎口有一道旧疤。"
background: "警校毕业，在江城刑警队干了十年。三年前因为一起办案失误离开警队——表面上是引咎辞职，具体原因只有少数人知道。此后开了自己的私家侦探所，勉强维持。"
story_role: "protagonist"

# 状态历史（归档时由Agent更新）
state_history:
  - after_volume: 1
    after_chapter: 3
    location: "江城——办公室、苏棠出租屋、物流公司、警局、回办公室"
    status: "接手苏棠失踪案调查三日。从被动接案到主动追查。发现案件与三年前旧案有关——那起案子正是他离开警队前办的最后一个案子。被人跟踪，办公室被侵入。决定继续查。"
    changes:
      - "从专业但疏离的私家侦探状态切换到积极追查模式"
      - "重新接触旧案卷宗和刑警队——过去被激活"
      - "与方岩的关系被重新激活，信任在松动"
      - "意识到调查被人盯上——威胁从暗示变为具体行为"
