# world-setting.yaml - 世界设定
name: "江城都市"
summary: "虚构的中国二线沿江城市，潮湿、拥挤、新旧交错。故事发生在当代，没有超自然元素。"

details:
  geography: "江城——长江中游的工业老城。北岸是老城区，巷窄楼密，沿江是九十年代的筒子楼和批发市场。南岸是新区，写字楼和商业综合体。江上有三座桥，最老的那座叫钟声桥，桥头的钟楼是民国建筑。"
  politics: "现实主义当代政治背景，不做虚构。警局内部有派系和人情关系，但不是主要冲突来源。"
  culture: "江城有自己的方言和饮食文化。老城区居民讲江城话，语调硬而短促。早餐是热干面和蛋酒，夜宵是烧烤和炒粉。老城区的人情社会——邻居互相认识，但也互相提防。"
  history: "江城在民国时期是通商口岸，留下了一批西式建筑。九十年代国企改制，大量的下岗工人。近十年城市扩张，南岸新区崛起，老城区逐渐空心化。"
  rules: "现实主义规则。没有超自然力量。法律、物理、社会规则都是现实世界的。警察办案有程序约束，私人侦探在法律灰色地带活动。"
  physics: "现实物理世界。"
  biology: "现实生物学。"
  sociology: "老城区熟人社会 vs 新区陌生人社会。经济下行压力下的小市民心态。警民关系紧张但务实。私人侦探行业的灰色生存状态。"
