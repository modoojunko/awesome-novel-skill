# hooks.yaml - 伏笔/钩子追踪

hooks:
  - id: "hook-001"
    description: "苏棠失踪——手机未带、无打斗痕迹、警方判定主动离开。调查发现她与三年前旧案证人老马有联系"
    introduced_in: "1-1"
    status: "pending"
    payoff_timing: "near_term"
    priority: 1
    hook_type: "mystery"
    hook_strength: "strong"
    hook_position: "chapter_end"
    seed_text: "照片拍的是某个街边店铺的卷帘门。门牌号钉在门框右上角，白底红字，五十三号。明江路门牌号只到五十一。"
    seed_location: "1-1"
    last_mentioned_chapter: "1-3"
    resolution_chapter: ""
    notes: "核心主线。第2章确认不是主动离开，第3章关联到三年前旧案"

  - id: "hook-002"
    description: "陆征三年前离开警队的真正原因——办案失误，案件被压下来"
    introduced_in: "1-1"
    status: "pending"
    payoff_timing: "slow_burn"
    priority: 2
    hook_type: "mystery"
    hook_strength: "medium"
    hook_position: "in_chapter"
    seed_text: "三年前老马在那桩案子里作了证，不久人就不来了。案子没破。三年后苏棠来找老马，然后她也不见了。"
    seed_location: "1-3"
    last_mentioned_chapter: "1-3"
    resolution_chapter: ""
    notes: "第3章通过与方岩对话推进——案子被压下来，方岩警告陆征别查"

  - id: "hook-003"
    description: "灰短袖男人在苏棠楼下盯梢陆征，并对他的车拍照——有人在监视调查"
    introduced_in: "1-2"
    status: "pending"
    payoff_timing: "immediate"
    priority: 2
    hook_type: "threat"
    hook_strength: "strong"
    hook_position: "chapter_end"
    seed_text: "灰短袖站到了巷口。一只手举着手机，镜头朝向这边。角度不高不低，正对车牌。"
    seed_location: "1-2"
    last_mentioned_chapter: "1-3"
    resolution_chapter: ""
    notes: "第2章结尾引入，第3章陆征仍在想那张脸。暗示调查被某个组织盯上"

  - id: "hook-004"
    description: "陆征办公室被侵入——门锁有撬痕，物品被翻动但不拿走。来人想让他知道自己被盯上了"
    introduced_in: "1-3"
    status: "pending"
    payoff_timing: "immediate"
    priority: 2
    hook_type: "threat"
    hook_strength: "strong"
    hook_position: "chapter_end"
    seed_text: "门把手下面的锁孔周围有三道划痕，铝质锁圈上翘起的毛刺泛白。新鲜的。椅子往右偏了十五公分。窗台沿一层灰白细末——烟灰。"
    seed_location: "1-3"
    last_mentioned_chapter: "1-3"
    resolution_chapter: ""
    notes: "第3章结尾。与方岩的警告形成呼应。威胁升级"

  - id: "hook-005"
    description: "物流公司访客登记表上只签了一个'周'字的人——也在找老马，身份不明"
    introduced_in: "1-3"
    status: "pending"
    payoff_timing: "near_term"
    priority: 3
    hook_type: "clue"
    hook_strength: "medium"
    hook_position: "in_chapter"
    seed_text: "一个'周'字。就一个字。没有日期，没有全名，没有电话。笔迹不是苏棠的——更潦草，收笔往上翘。"
    seed_location: "1-3"
    last_mentioned_chapter: "1-3"
    resolution_chapter: ""
    notes: "可能的线索来源或另一条追查线"

hook_type_guide:
  mystery:     "悬念钩：信息缺口/未解之谜 → 读者想知道答案"
  threat:      "危机钩：敌人出现/危险逼近 → 读者担心角色安全"
  promise:     "承诺钩：明确预告未来事件 → 读者期待兑现"
  clue:        "线索钩：碎片信息/暗示 → 读者想拼出全貌"
  relationship:"关系钩：角色关系张力/变化 → 读者想看关系走向"
  power:       "能力钩：能力突破/新技能预告 → 读者期待变强"
  emotion:     "情绪钩：触发愤怒/心疼/共情/不公 → 读者想替主角出头或看到正义"
  choice:      "选择钩：两难抉择/高风险决策 → 读者想知道角色怎么选"
  desire:      "渴望钩：奖励/突破/复仇/真相在即 → 读者想看到愿望实现的过程"

hook_strength_guide:
  strong:  "卷末/关键转折/大冲突前——读者必须立刻知道后续"
  medium:  "普通剧情章——读者想知道，但可以等到下一章"
  weak:    "过渡章/铺垫章——维持阅读惯性即可"

hook_health_rules:
  payoff_distribution:
    immediate_max: 3
    near_term_max: 5
    mid_arc_max: 8
    slow_burn_max: 5
  stale_threshold:
    high_priority: 5
    normal_priority: 3
  no_burst_settlement: true
  no_orphan_hooks: true
  strength_distribution:
    max_consecutive_weak: 3
    require_strong_every: 5

hook_operations:
  upsert: "新增或更新钩子"
  mention: "本章提及已有钩子，更新 last_mentioned_chapter"
  resolve: "钩子在当前章收束，填入 resolution_chapter"
  defer: "钩子收束推迟"
  abandon: "废弃钩子"
  extract_seed: "归档时从正文中提取新埋钩子的原文片段"
