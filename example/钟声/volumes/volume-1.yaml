# volume-1.yaml - 第一卷"失踪者"

volume: 1
title: "失踪者"
summary: "退役刑警陆征转行私家侦探后，接到一桩看似普通的失踪案。委托人苏沫的姐姐苏棠失踪两周，警方判定为主动离开。陆征在调查中发现线索指向三年前一起未破的悬案——那起案子，正是他离开警队的原因。"

chapters_summary:
  - id: "1-1"
    title: "委托人"
    summary: "苏沫来到陆征的办公室，讲述姐姐苏棠失踪的经过。陆征接下案子，开始初步调查。"
  - id: "1-2"
    title: "出租屋"
    summary: "陆征勘查苏棠的出租屋，发现与警方结论矛盾的细节——苏棠不是主动离开的。"
  - id: "1-3"
    title: "旧案"
    summary: "线索指向三年前的旧案。陆征找方岩打听消息，发现有人在盯着他。"
