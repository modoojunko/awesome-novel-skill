title: "呼吸"

outline:
  summary: "三天后的午夜，林渡独自坐在墓前的石阶上。他对自己的行为感到荒谬——一个土木工程毕业生，大半夜守着一块石板等它'呼吸'。午夜整点，地面开始震动。有节奏的、每分钟四次的震动，像一个人平静地呼吸。持续七分钟。震动停止后，墓门的青石板发出轻微的摩擦声——不是移动，是放松，像一扇关了很久的门终于被推了一下。门开了一条缝。从缝隙里涌出的气流带着一种不属于山体内部的温度。然后一个声音从门缝里传出来，用祖父的语气，不紧不慢地叫了他的名字——全名，包括那个只有祖父还在用的称呼。"
  key_points:
    - "守夜前的三天——林渡试图用工程学解释'呼吸'（地震？地下水？温差导致的热胀冷缩？）但每一项都被推翻"
    - "午夜守墓——林渡坐在石阶上，手电筒的光照着墓门，他觉得自己很蠢"
    - "呼吸开始——震动从脚底传上来，不是地震，是有节奏的，每分钟四次"
    - "呼吸期间林渡的身体反应——耳鸣、骨头里的冷、手指不自觉地在石阶上攥紧"
    - "呼吸停止后的寂静——然后石板发出摩擦声，门开了"
    - "祖父的声音从门缝里叫了他的名字——全名，包括那个只有祖父还在用的称呼"
