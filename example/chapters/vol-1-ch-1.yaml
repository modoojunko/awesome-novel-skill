content: |
  凌晨六点整，林辰关掉了最后一个终端窗口。

  办公室只剩他一个人。空调在凌晨自动调高了温度，空气闷得发黏。他把笔记本塞进背包，在电梯里靠着镜子站了一会儿。镜子里的人眼眶发青，下巴上有两天没刮的胡茬。

  三号线的末班车总是很空。他习惯性地选了靠门的位置，把背包放在膝盖上，头靠着车窗。车厢里还有五六个人——对面是个穿灰色夹克的中年男人，捧着保温杯，目光落在车厢地板上的某一点，一动不动。再远处，一个年轻女人戴着耳机翻手机，屏幕的光映在她脸上，表情空白。一对情侣坐在车厢尽头，男生的头靠在女生肩上，两个人都闭着眼。

  地铁报站。电子女声被隧道的轰鸣吞掉一半。

  六点四十七分。林辰后来反复确认过这个时间——他抬手看表，秒针正走到十二。就在这时，他的左耳嗡了一声。

  不是地铁的噪音。是一种从内向外扩散的低频振动，像有人在耳道深处弹了一下琴弦。他下意识按了按耳朵，抬起头。

  然后他看见了。

  一团暗色的、半透明的东西正从车厢顶部渗入。不是烟，不是液体。它像热浪上方扭曲的空气，边缘模糊，不停蠕动。它在动。缓慢地、没有任何声音地，向下方的中年男人靠近。

  林辰眨了眨眼。

  它还在。

  不是光斑。不是疲劳引起的幻觉。不是车窗上的倒影。他把视线移开，看窗外漆黑的隧道，再看回来。

  那团东西已经包裹了中年男人的半个身体。

  中年男人没有任何反应。他没有尖叫，没有躲避，他甚至没有抬头。他就那么坐着，目光仍然落在地上，像是被冻住了一样。保温杯从他手里滑下来，磕在地板上，发出金属和塑料碰撞的轻响。那是整个过程中唯一的声音。

  林辰想站起来，想喊，想伸手。但他的身体没有响应。不是因为恐惧——他后来会反复向自己解释这一点——而是因为身体比大脑更早理解了正在发生的事情。这个场景超出了语言和动作的范畴。像你举起手要打蚊子，却发现那只蚊子在另一个焦距上——不在你的手能碰到的地方。

  三分钟。

  那团东西从另一边滑出，消失在车厢连接处的黑暗中。隧道尽头的灯光开始扫进车窗。地铁开始减速。

  座位空了。

  保温杯还在地上，晃晃悠悠地滚动了两圈，停在座位正下方。杯盖摔开了一条缝，有热水漏出来，在地板上留下一小摊水迹。

  林辰盯着那摊水，盯了很久。

  地铁到站。那个年轻女人从手机前抬起头，打了个哈欠。远处那对情侣被报站声惊醒，男生揉了揉眼，拉着女生下了车。没有一个人看那个空座位一眼。不是刻意避开——是那个座位和它的空荡，在他们的认知中根本不存在。保温杯，也不存在。那摊水，那个人，那一整个曾被命名的存在——都不存在。

  林辰是最后一个下车的人。

  他低头看手表。秒针正常地走着。

  六点五十分。
