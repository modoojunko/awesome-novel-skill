outline:
  summary: "林渡接到祖父去世的消息，从县城赶回阔别三年的青石村。他在老宅收拾祖父遗物时发现一本布面笔记本，记录了守墓人的职责和古墓的'呼吸周期'——每六十年一次，下次就在三天后。笔记前半本是枯燥的日期和数据，后半本变成了祖父对'墓中之物'的推测。最后一页只有两行字：'如果你回来，去墓前守着。如果你没回来——那就没回来吧。'林渡在祖父的房间里坐了一整夜。第二天他拿着手电筒，第一次独自走上了通往古墓的两百级石阶。"
  key_points:
    - "林渡进村——青石村的萧条、村民对他的注视、'你爷爷说你不会回来'"
    - "老宅和祖父的房间——半杯茶、桌上的老花镜、抽屉里的布面笔记本"
    - "笔记内容——前半是数据（呼吸周期精确记录），后半是推测（墓中之物、约定、'它在等'）"
    - "最后一页的遗言——祖父对林渡是否会回来没有把握，但留了话"
    - "林渡在祖父房间坐了一夜——这三年他为什么不回来，他此刻在想什么"
    - "第二天走向古墓——两百级石阶，石阶尽头是那块三米高的青石板"
  characters:
