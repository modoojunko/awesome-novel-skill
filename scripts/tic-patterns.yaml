# 结构性句式癖好检测 — 规范列表
# analyze_style.py 在运行时加载此文件，不会硬编码这些模式。
# anti-ai.yaml.template 的第 8 个规则的 threshold 来自此处。
# 修改时需同时更新 anti-ai.yaml.template 的对应条目。
# ============================================================

patterns:
  - name: "不是而是句式"
    pattern: "不是.{1,20}(而是|，是|,是)"
    threshold: 3
    severity: "high"
  - name: "没有X只是Y句式"
    pattern: "没有.{1,20}(只不过|只是|而是)"
    threshold: 3
    severity: "medium"
  - name: "否定-纠正句式"
    pattern: "(不[,，]?\s*不是这样|其实并非如此|更准确[地性]说|不[,，]?\s*[他她它那这])"
    threshold: 2
    severity: "high"
  - name: "破折号解释句式"
    pattern: "——(他|她|它|这|那)"
    threshold: 5
    severity: "medium"
  - name: "公式化副词"
    pattern: "(不由得|不禁|忍不住|不由自主地|下意识地|鬼使神差地)"
    threshold: 4
    severity: "high"
  - name: "一边一边句式"
    pattern: "一边.{1,20}一边"
    threshold: 2
    severity: "medium"
  - name: "就在这时句式"
    pattern: "(就在这时|正在这时|突然[，,])"
    threshold: 5
    severity: "medium"
  - name: "身体部位情绪模板"
    pattern: "(眼神|目光|瞳孔|心头|心里|心中|心底|手心|指尖|喉咙).{0,10}(一|微|暗|沉|紧|颤|抖|缩|松|暖|寒|凉|热|酸)"
    threshold: 6
    severity: "high"
