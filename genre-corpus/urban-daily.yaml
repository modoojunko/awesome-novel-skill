# variant: 都市日常 — extends urban.yaml
# 差异化：节奏调慢，口味偏情感/生活

genre_config:
  satisfaction_types: ["生活小确幸", "关系升温", "职场进步", "误会解开", "温暖瞬间"]
  chapter_types: ["日常生活", "情感交流", "职场成长", "家庭温情", "人际交往"]
  pacing_rules:
    max_consecutive_action_chapters: 1
    max_consecutive_daily_chapters: 4
    beat_density_min: 1

genre_fatigue_words:
  - "在这个城市"
  - "万家灯火"

anti_cliches:
  - "主角必是底层社畜——可以有不同职业和生活状态"
  - "都市女性不是只会谈恋爱——她们有自己的生活和追求"

story_arc_templates:
  default: "日常→波澜→应对→成长→回归日常"
  variants: null
