# index.yaml — 24种分类注册表
# Phase 2 展示时扁平列出，作者看不到继承关系
# Phase 4 读取时：先读 corpus 指向的基类，再叠加 variant/ 同名文件的差异字段

genres:
  # 都市系（7种）
  - id: "urban-daily"
    label: "都市日常"
    description: "都市情感、现实生活等都市文。"
    corpus: "urban.yaml"
  - id: "urban-brained"
    label: "都市脑洞"
    description: "拥有金手指系统的男频都市脑洞奇想。"
    corpus: "urban.yaml"
  - id: "urban-farming"
    label: "都市种田"
    description: "重生年代文、职场商战文、种田建设等都市文。"
    corpus: "urban.yaml"
  - id: "urban-high-martial"
    label: "都市高武"
    description: "都市架空，全民拥有修炼体系、灵气复苏等。"
    corpus: "urban.yaml"
  - id: "urban-cultivation"
    label: "都市修真"
    description: "以修真为力量体系的都市文。"
    corpus: "urban.yaml"
  - id: "war-god"
    label: "战神赘婿"
    description: "都市向战神、兵王文。"
    corpus: "urban.yaml"

  # 历史系（3种）
  - id: "historical-ancient"
    label: "历史古代"
    description: "以种田、朝堂、智谋、争霸、科举等为主，无金手指非系统历史文。"
    corpus: "historical.yaml"
  - id: "historical-brained"
    label: "历史脑洞"
    description: "脑洞向历史，一般有金手指。"
    corpus: "historical.yaml"
  - id: "anti-japanese-war"
    label: "抗战谍战"
    description: "抗战时期的军事战争和间谍情报的男频小说。"
    corpus: "historical.yaml"

  # 玄幻系（2种）
  - id: "xuanhuan"
    label: "传统玄幻"
    description: "废柴逆袭，强者重生等传统玄幻，高武世界，异世大陆文。"
    corpus: "xuanhuan.yaml"
  - id: "xuanhuan-brained"
    label: "玄幻脑洞"
    description: "脑洞向玄幻。"
    corpus: "xuanhuan.yaml"

  # 悬疑系（3种）
  - id: "suspense-crime"
    label: "悬疑刑侦"
    description: "男频探案、悬疑、推理。"
    corpus: "suspense-crime.yaml"
  - id: "suspense-paranormal"
    label: "悬疑灵异"
    description: "男频探案、悬疑、恐怖、风水奇术等。"
    corpus: "suspense-crime.yaml"
  - id: "suspense-brained"
    label: "悬疑脑洞"
    description: "脑洞向的悬疑灵异、破案探险类，以及诡异复苏、惊悚游戏、规则怪谈等。"
    corpus: "suspense-crime.yaml"

  # 科幻系（1种）
  - id: "scifi-apocalypse"
    label: "科幻末世"
    description: "末世、丧尸、星际、机甲、未来科技等。"
    corpus: "scifi-apocalypse.yaml"

  # 独立类型（4种）
  - id: "western-fantasy"
    label: "西方奇幻"
    description: "偏西方世界背景下，包含魔法斗气奥术等奇幻元素的小说。"
    corpus: "western-fantasy.yaml"
  - id: "xianxia"
    label: "东方仙侠"
    description: "偏东方世界背景下，包含修仙修道修真等仙侠元素的小说。"
    corpus: "xianxia.yaml"
  - id: "male-derivative"
    label: "男频衍生"
    description: "影视剧男频同人小说。"
    corpus: "derivative.yaml"
  - id: "anime-derivative"
    label: "动漫衍生"
    description: "游戏、动漫等偏二次元向的同人作品。"
    corpus: "derivative.yaml"
  - id: "game-sports"
    label: "游戏体育"
    description: "网游、竞技、体育及穿入游戏或世界游戏化。"
    corpus: "derivative.yaml"
