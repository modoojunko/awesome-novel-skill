# variant: 战神赘婿 — extends urban.yaml
# 差异化：战神/兵王回归、扮猪吃虎爽文

genre_elements_add:
  - "战神/兵王退役回归都市"
  - "扮猪吃老虎——表面平凡实则最强"
  - "打脸爽感——看不起主角的人依次被打脸"
  - "隐藏身份悬念——身边的爱人不知道主角的真实实力"

taboos_add:
  - "禁止主角长时间处于被动——战神流的核心是掌控感，憋屈不超过1章"
  - "禁止反派太多戏份——反派是给主角打脸用的，不需要复杂动机和长篇内心戏"
  - "禁止虐主——战神流读者不接受主角被欺负超过1章"
  - "禁止忽视家人——主角对家人的保护应是行动驱动力之一"

genre_config:
  satisfaction_types: ["身份揭晓", "打脸装逼", "实力碾压", "扮猪吃虎", "守护成功"]
  chapter_types: ["日常装逼", "打脸反转", "身份揭晓", "冲突爆发", "战斗碾压"]
  pacing_rules:
    max_consecutive_action_chapters: 3
    max_consecutive_daily_chapters: 1
    beat_density_min: 2

genre_fatigue_words:
  - "龙王归来"
  - "三十年河东"
  - "一声令下"
  - "十万将士"
  - "颤抖吧"

anti_cliches:
  - "主角忍让超过1章——战神流的核心是掌控感，一直被压着读者会弃书"
  - "反派描写过多——反派是给主角打脸用的，不需要复杂动机"
  - "家人/妻子一直不知道主角身份拖到大结局——适度的身份隐藏才有张力"
  - "主角的所有能力都是武力——战神也可以有谋略和人情世故"

story_arc_templates:
  default: "回归→扮猪→遇事→打脸→升级对手→再打脸→身份揭晓→更高舞台"
  variants: null
