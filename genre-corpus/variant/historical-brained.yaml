# variant: 历史脑洞 — extends historical.yaml
# 差异化：有金手指，节奏更轻快

genre_elements_add:
  - "系统/金手指（历史知识兑换、技术加速、人才召唤等）"
  - "穿越/重生利用信息差改变历史"
  - "脑洞向的历史转折——不严格遵循史实但需内部自洽"

taboos_add:
  - "禁止金手指过于强大导致失去冲突——有金手指不等于事事顺利"
  - "禁止历史常识错误太离谱——可以架空但不能将宋朝的官制套到明朝"
  - "禁止主角变成历史全知全能——主角应该在自己的认知范围内合理决策"

genre_config:
  satisfaction_types: ["工业革命", "商业垄断", "军事胜利", "计谋得逞", "打脸古代人"]
  chapter_types: ["穿越适应", "金手指运用", "势力扩张", "科技推进", "权力博弈"]
  pacing_rules:
    max_consecutive_action_chapters: 2
    max_consecutive_daily_chapters: 2
    beat_density_min: 2

anti_cliches:
  - "穿越者三章内搞定蒸汽车床——科技发展需要时间和试错"
  - "古代人都是蠢货——古人在自己的时代有智慧和经验"
  - "金手指一步到位——应该逐步解锁，让主角保持成长感"

story_arc_templates:
  default: "穿越→立足→发展→遇阻→突破→崛起"
  variants: null
