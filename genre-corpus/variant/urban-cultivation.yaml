# variant: 都市修真 — extends urban.yaml
# 差异化：修真力量体系融入都市背景

genre_elements_add:
  - "修真力量体系在都市的隐藏存在（修真者隐藏在普通人社会之下）"
  - "都市与修真两个世界的冲突与规则碰撞"
  - "修炼资源在现代社会的形态（灵石/丹药在都市中的获取方式）"
  - "修真者在现代社会的身份隐藏和生存法则"

taboos_add:
  - "禁止修真体系与都市背景脱节——修真者不能脱离现代社会存在"
  - "禁止破坏都市世界观——除非设定就是揭露修真世界，否则不能对普通人公开"
  - "禁止修真力量解决一切问题——都市场景中仍需遵守都市的规则"

genre_config:
  satisfaction_types: ["境界突破", "法宝炼成", "打脸装逼", "秘境夺宝", "身份揭晓"]
  chapter_types: ["修炼日常", "都市生活", "修真争斗", "势力博弈", "秘境探险"]
  pacing_rules:
    max_consecutive_action_chapters: 2
    max_consecutive_daily_chapters: 2
    beat_density_min: 1

anti_cliches:
  - "修真者看不起所有普通人——可以有冲突但不能脸谱化"
  - "都市修真就是换个背景的仙侠——都市规则仍然适用"
  - "修真者想在都市里干什么就干什么——修真界也有自己的规矩和约束"

power_system_ref: "xianxia"

story_arc_templates:
  default: "入世→修炼→冲突→秘闻→危机→飞升/隐退"
  variants: null
