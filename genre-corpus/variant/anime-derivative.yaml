# variant: 动漫衍生 — extends derivative.yaml
# 差异化：二次元同人，语感和画风匹配

genre_elements_add:
  - "二次元作品（动漫/漫画/轻小说）的同人创作"
  - "角色标志性口头禅/动作/习惯的还原"
  - "夸张表现与日常感的平衡（二次元的表达方式在文字中的适度呈现）"

taboos_add:
  - "禁止ooc——角色可以深度挖掘但不能改变核心性格"
  - "禁止世界观规则的破坏——动漫世界的特殊规则（如忍者的查克拉、海贼的恶魔果实）必须遵守"
  - "禁止过度原创破坏原作关系——角色间的关系类型不能与原作矛盾"

genre_config:
  satisfaction_types: ["角色互动", "名场面还原", "剧情if线", "cp发糖", "战力讨论"]
  chapter_types: ["主线重绎", "日常补全", "战斗还原", "if线展开", "角色solo回"]
  pacing_rules:
    max_consecutive_action_chapters: 3
    max_consecutive_daily_chapters: 2
    beat_density_min: 1

story_arc_templates:
  default: "根据原作结构适配"
  variants: null
