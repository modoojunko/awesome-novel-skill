# variant: 游戏体育 — extends derivative.yaml
# 差异化：网游、竞技、体育、穿入游戏

genre_elements_add:
  - "游戏机制还原（等级/装备/技能/副本/pvp等游戏系统）"
  - "竞技体育专业（具体运动的规则、战术、训练方法）"
  - "玩家/选手的成长曲线（操作/意识/心态的全面提升）"
  - "穿入游戏/世界游戏化/数据化等设定"

taboos_add:
  - "禁止游戏系统过于复杂看不懂——游戏机制应通过角色体验自然展现"
  - "禁止竞技专业错误——写电竞就懂电竞、写足球就懂足球，不能想当然"
  - "禁止穿入游戏后完全脱离游戏规则——游戏世界的底层规则应被遵守"
  - "禁止无敌流走到底——游戏/竞技的魅力在于有输有赢、有成长"

genre_config:
  satisfaction_types: ["团战胜利", "装备获取", "副本通关", "竞技夺冠", "操作高光"]
  chapter_types: ["日常训练", "副本攻略", "pvp对决", "竞技比赛", "装备打造"]
  pacing_rules:
    max_consecutive_action_chapters: 3
    max_consecutive_daily_chapters: 2
    beat_density_min: 2

anti_cliches:
  - "主角一出场就是天才——天才+努力才是王道"
  - "电竞文里主角的战队永远不吵架——团队有磨合才有真实感"
  - "体育竞技就是一直赢——输球的成长比赢球更有价值"

story_arc_templates:
  default: "入门→训练→初赛→成长→大赛→巅峰"
  variants: null
