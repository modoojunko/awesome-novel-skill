# variant: 男频衍生 — extends derivative.yaml
# 差异化：影视剧男频同人

genre_elements_add:
  - "影视剧/小说IP的二次创作"
  - "原作世界观的严格遵守（影视级画风、物理规则、社会背景）"
  - "角色保真度（视听化角色的标志性语言和行为习惯）"

taboos_add:
  - "禁止原创主角喧宾夺主——原作主角才是世界的核心"
  - "禁止篡改原作关键剧情节点——关键事件不能随意改写（if线除外）"
  - "禁止角色ooc——演员的脸和角色的魂都要守住"

genre_config:
  satisfaction_types: ["名场面还原", "角色高光重现", "留白补全", "if线展开"]
  chapter_types: ["主线重绎", "支线展开", "日常补全", "原创剧情", "角色深挖"]
  pacing_rules:
    max_consecutive_action_chapters: 3
    max_consecutive_daily_chapters: 2
    beat_density_min: 1

story_arc_templates:
  default: "根据原作结构适配"
  variants: null
