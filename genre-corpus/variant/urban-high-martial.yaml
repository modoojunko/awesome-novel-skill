# variant: 都市高武 — extends urban.yaml
# 差异化：灵气复苏、全民修炼、战力体系

genre_elements_add:
  - "灵气复苏/天地异变（世界规则改变、能量苏醒）"
  - "全民修炼体系（武道/异能/觉醒等级体系清晰）"
  - "战力等级与都市秩序的冲突（强者与社会规则的碰撞）"
  - "秘境/异界入侵等外部威胁"

taboos_add:
  - "禁止战力体系崩坏——等级之间的差距明确，越级需要代价"
  - "禁止修炼速度不合理——天赋、资源、机缘三者缺一不可"
  - "禁止都市变纯玄幻——背景仍是现代都市，社会秩序仍然存在"

genre_config:
  satisfaction_types: ["境界突破", "越级反杀", "觉醒新能力", "秘境夺宝", "打脸装逼"]
  chapter_types: ["修炼突破", "战斗对决", "势力博弈", "日常校园/职场", "秘境探险"]
  pacing_rules:
    max_consecutive_action_chapters: 3
    max_consecutive_daily_chapters: 2
    beat_density_min: 1

genre_fatigue_words:
  - "灵气复苏"
  - "天地异变"
  - "觉醒者"

anti_cliches:
  - "主角一定是最高天赋——天赋和代价成正比"
  - "国家机构在灵气复苏后毫无作为——国家一定会有反应"
  - "普通人在修炼者面前毫无价值——修炼者也不能脱离社会存在"

power_system_ref: "xianxia"  # 修炼体系可参考仙侠的境界设定逻辑

story_arc_templates:
  default: "觉醒→修炼→初战→成长→危机→强者之路"
  variants: null
