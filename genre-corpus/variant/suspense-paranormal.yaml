# variant: 悬疑灵异 — extends suspense-crime.yaml
# 差异化：风水鬼怪、灵异恐怖

genre_elements_add:
  - "灵异事件（鬼怪/怨灵/阴煞/邪祟等超自然存在）"
  - "风水术数/民间法术（风水格局、符箓、法事、驱邪等）"
  - "恐怖氛围营造（未知恐惧、心理压迫、视觉恐怖）"
  - "灵异规则体系（鬼怪的能力边界、克制方法、代价）"

taboos_add:
  - "禁止灵异设定无规则——鬼怪不是无敌的，一定有弱点和规则"
  - "禁止为了恐怖让角色降智——恐惧中的求生本能是合理的，但不等于变成傻子"
  - "禁止民间法术变成万能——法事有代价、符箓有限制、风水不能改命"

genre_config:
  satisfaction_types: ["灵异破解", "驱邪成功", "真相揭示", "逃生成功", "怨气化解"]
  chapter_types: ["灵异调查", "驱邪斗法", "恐怖探索", "幕后追查", "事件收尾"]
  pacing_rules:
    max_consecutive_action_chapters: 2
    max_consecutive_daily_chapters: 2
    beat_density_min: 1

anti_cliches:
  - "所有灵异事件都是一个原因——灵异来源应该多样化"
  - "高人一出马就能解决——解决过程应艰难且有代价"
  - "鬼出现必是冤魂索命——可以有更多样化的灵异逻辑"

story_arc_templates:
  default: "异象→调查→深入→危机→破局→收尾"
  variants: null
