# variant: 都市种田 — extends urban.yaml
# 差异化：年代文/商战/种田建设的慢节奏

genre_elements_add:
  - "年代特征（具体的年代背景、时代政策、社会氛围）"
  - "商业经营（开店/创业/投资/产业链建设）"
  - "种田建设（从零开始积累资源、步步扩张）"
  - "时代机遇与个人眼光的结合"

taboos_add:
  - "禁止年代背景不准确——服饰/物价/政策/流行文化要查资料"
  - "禁止商战写成过家家——商业决策需要行业知识和合理判断"
  - "禁止种田没有积累感——每一步建设应看到具体成果"

genre_config:
  satisfaction_types: ["生意兴隆", "技术突破", "资产增值", "打脸商业对手", "建设成果"]
  chapter_types: ["日常经营", "商业博弈", "技术攻关", "人际周旋", "时代变迁"]
  pacing_rules:
    max_consecutive_action_chapters: 1
    max_consecutive_daily_chapters: 4
    beat_density_min: 1

anti_cliches:
  - "重生者靠记忆炒股买房——过于简单了，商业成功需要更多的经营细节"
  - "年代文里所有人都对主角好——那个年代的人际关系更复杂"
  - "种田就是无脑扩张——盲目扩张会带来资金和管理问题"

story_arc_templates:
  default: "起步→积累→扩张→遇阻→突破→新高度"
  variants: null
